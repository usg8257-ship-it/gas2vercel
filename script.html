<script>
'use strict';

// ============================================================
// FLAG MAP
// ============================================================
var FLAG_MAP={'INDIA':'🇮🇳','PAKISTAN':'🇵🇰','PHILIPPINES':'🇵🇭','NEPAL':'🇳🇵','SRI LANKA':'🇱🇰','BANGLADESH':'🇧🇩','EGYPT':'🇪🇬','KENYA':'🇰🇪','NIGERIA':'🇳🇬','ETHIOPIA':'🇪🇹','UGANDA':'🇺🇬','GHANA':'🇬🇭','JORDAN':'🇯🇴','INDONESIA':'🇮🇩','UAE':'🇦🇪','SAUDI ARABIA':'🇸🇦','MYANMAR':'🇲🇲','VIETNAM':'🇻🇳','THAILAND':'🇹🇭','CHINA':'🇨🇳','MOROCCO':'🇲🇦','TANZANIA':'🇹🇿','SOUTH AFRICA':'🇿🇦','ZIMBABWE':'🇿🇼','SUDAN':'🇸🇩'};
function getFlag(nat){ return FLAG_MAP[String(nat||'').toUpperCase()]||'🌍'; }

// ENTITY normalise (4 valid: USG, UG, UST, USG-M)
function normEnt(raw){
  var v=String(raw||'').trim().toUpperCase();
  if(v==='UGU'||v==='USU') return 'UG';
  if(v==='USG-M') return 'USG-M';
  if(v==='USG') return 'USG';
  if(v==='UG') return 'UG';
  if(v==='UST') return 'UST';
  return v||null;
}

// ============================================================
// APP STATE
// ============================================================
var APP={config:{},master:[],deletions:[],onboarding:[],hrDocs:[],summary:[],dsTracker:[],loaded:false,user:{email:'',name:'',role:'',entities:[],active:true},token:''};
// Track if any modal is open (to block auto-refresh during editing)
var EDITING=false;

function getActiveEmployees(){
  var delIds={};
  APP.deletions.forEach(function(d){ if(d.EMP_ID) delIds[String(d.EMP_ID).trim()]=true; });
  // deduplicate by ID
  var seen={},result=[];
  APP.master.forEach(function(r){
    var id=String(r.ID||'').trim();
    if(!id) return;
    if(seen[id]) return;
    if(r.STATUS==='DELETED'||delIds[id]) return;
    seen[id]=true;
    result.push(r);
  });
  return result;
}

// ============================================================
// UTILITIES
// ============================================================
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today(){ return new Date().toISOString().split('T')[0]; }
function todayDisplay(){ return new Date().toLocaleDateString('en-AE',{day:'2-digit',month:'long',year:'numeric'}); }
// Normalise any date string to DD/MM/YYYY for display
function fmtD(s){
  if(!s||s==='—') return s||'—';
  var m;
  m=String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})$/); if(m) return s;
  m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);    if(m) return m[3]+'/'+m[2]+'/'+m[1];
  var d=new Date(s); if(!isNaN(d)) return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
  return s;
}
function genId(p){ return (p||'ID')+'-'+Date.now().toString().slice(-8); }

// ============================================================
// MULTI-SELECT CHECKBOX DROPDOWN
// ============================================================
var MultiSel={
  // Toggle open/close a dropdown
  toggle:function(id){
    var wrap=document.getElementById(id); if(!wrap) return;
    var drop=wrap.querySelector('.ms-drop');
    var opening=!drop.classList.contains('open');
    // close all others first
    document.querySelectorAll('.ms-drop.open').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.ms-wrap.ms-open').forEach(function(w){ w.classList.remove('ms-open'); });
    if(opening){ drop.classList.add('open'); wrap.classList.add('ms-open'); }
  },
  // Get array of checked values for a ms-wrap
  get:function(id){
    var wrap=document.getElementById(id); if(!wrap) return [];
    var vals=[];
    wrap.querySelectorAll('input[type=checkbox]:checked').forEach(function(cb){ vals.push(cb.value); });
    return vals;
  },
  // Reset all checkboxes in a ms-wrap to unchecked
  reset:function(id){
    var wrap=document.getElementById(id); if(!wrap) return;
    wrap.querySelectorAll('input[type=checkbox]').forEach(function(cb){ cb.checked=false; });
    MultiSel._sync(id);
  },
  // Update label and active class after checkbox change
  _sync:function(id){
    var wrap=document.getElementById(id); if(!wrap) return;
    var vals=MultiSel.get(id);
    var label=wrap.querySelector('.ms-label');
    if(label){
      if(!vals.length){
        // Restore placeholder from first option's text or default
        var placeholder=wrap.querySelector('.ms-btn').dataset.placeholder||'All';
        label.innerHTML=esc(placeholder);
      } else if(vals.length<=2){
        label.innerHTML=vals.map(function(v){ return esc(v); }).join(', ');
      } else {
        label.innerHTML=vals[0]+' <span class="ms-sel-cnt">+'+( vals.length-1)+'</span>';
      }
    }
    if(vals.length) wrap.classList.add('ms-active');
    else wrap.classList.remove('ms-active');
  },
  // Build a dynamic dropdown (used for year / designation lists)
  build:function(dropId,options,syncId){
    var drop=document.getElementById(dropId); if(!drop) return;
    drop.innerHTML=options.map(function(o){
      return '<label class="ms-item"><input type="checkbox" value="'+esc(o.value)+'" onchange="MultiSel._sync(\''+syncId+'\')"> '+esc(o.label)+'</label>';
    }).join('');
    MultiSel.reset(syncId);
  }
};
// Close any open multi-select when clicking outside
document.addEventListener('click',function(e){
  if(!e.target.closest('.ms-wrap')){
    document.querySelectorAll('.ms-drop.open').forEach(function(d){ d.classList.remove('open'); });
    document.querySelectorAll('.ms-wrap.ms-open').forEach(function(w){ w.classList.remove('ms-open'); });
  }
});

function toast(msg,type){
  var box=document.getElementById('tbox');
  var el=document.createElement('div'); el.className='toast t-'+(type||'info'); el.textContent=msg;
  box.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transform='translateX(110%)'; el.style.transition='.3s'; setTimeout(function(){ el.remove(); },300); },3500);
}
function toastAction(msg,btnLabel,onYes){
  var box=document.getElementById('tbox');
  var el=document.createElement('div'); el.className='toast t-success'; el.style.cssText='display:flex;align-items:center;gap:10px;padding:12px 14px;';
  el.innerHTML='<span style="flex:1">'+msg+'</span>'+
    '<button style="background:var(--navy);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11.5px;cursor:pointer;white-space:nowrap">'+btnLabel+'</button>'+
    '<button style="background:transparent;color:rgba(255,255,255,0.7);border:none;font-size:14px;cursor:pointer;padding:0 2px" title="Dismiss">&times;</button>';
  var timer=setTimeout(function(){ el.remove(); },8000);
  el.querySelectorAll('button')[0].onclick=function(){ clearTimeout(timer); el.remove(); onYes(); };
  el.querySelectorAll('button')[1].onclick=function(){ clearTimeout(timer); el.remove(); };
  box.appendChild(el);
}
function openM(id){ EDITING=true; document.getElementById(id).classList.add('show'); }
function closeM(id){ document.getElementById(id).classList.remove('show'); EDITING=false; }
document.addEventListener('click',function(e){ if(e.target.classList.contains('modal-overlay')){ e.target.classList.remove('show'); EDITING=false; } });

// ============================================================
// EXPERIENCE LETTER — PDF download helper + trigger
// ============================================================
function _downloadPdf(base64, filename) {
  var bytes = new Uint8Array(atob(base64).split('').map(function(c){ return c.charCodeAt(0); }));
  var blob = new Blob([bytes], {type:'application/pdf'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
// Extract page 2 (skip blank template cover) and open result modal with Download + Print
function _openExpPdfResult(base64, filename) {
  var bytes = new Uint8Array(atob(base64).split('').map(function(c){ return c.charCodeAt(0); }));
  PDFLib.PDFDocument.load(bytes).then(function(srcDoc){
    var pageIdx = srcDoc.getPageCount() >= 2 ? 1 : 0;
    return PDFLib.PDFDocument.create().then(function(newDoc){
      return newDoc.copyPages(srcDoc, [pageIdx]).then(function(copied){
        newDoc.addPage(copied[0]);
        return newDoc.save();
      });
    });
  }).then(function(pdfBytes){
    var blob = new Blob([pdfBytes], {type:'application/pdf'});
    _openPdfResult(URL.createObjectURL(blob), filename);
  }).catch(function(){
    var blob = new Blob([bytes], {type:'application/pdf'});
    _openPdfResult(URL.createObjectURL(blob), filename);
  });
}

// Merge multiple raw base64 PDFs (each stripping blank first page), then invoke cb(blobUrl)
function _mergeBulkExpPdfs(base64Array, cb) {
  PDFLib.PDFDocument.create().then(function(mergedDoc){
    var chain = Promise.resolve();
    base64Array.forEach(function(b64){
      chain = chain.then(function(){
        var b = new Uint8Array(atob(b64).split('').map(function(c){ return c.charCodeAt(0); }));
        return PDFLib.PDFDocument.load(b).then(function(srcDoc){
          var pi = srcDoc.getPageCount() >= 2 ? 1 : 0;
          return mergedDoc.copyPages(srcDoc, [pi]).then(function(cp){ mergedDoc.addPage(cp[0]); });
        }).catch(function(){});
      });
    });
    return chain.then(function(){ return mergedDoc.save(); });
  }).then(function(pdfBytes){
    cb(URL.createObjectURL(new Blob([pdfBytes], {type:'application/pdf'})));
  });
}

// Show PDF result modal wired to a blob URL
function _openPdfResult(url, filename) {
  var dl = document.getElementById('pdf-download-btn');
  if(dl) dl.onclick = function(){ var a=document.createElement('a'); a.href=url; a.download=filename; a.click(); };
  var pr = document.getElementById('pdf-print-btn');
  if(pr) pr.onclick = function(){ var w=window.open(url); if(w) w.onload=function(){ w.print(); }; };
  var lbl = document.getElementById('pdf-result-label');
  if(lbl) lbl.textContent = filename;
  openM('m-pdf-result');
}

function genExpLetter(empId, name, onDone) {
  var btn = document.querySelector('[data-exltr="'+empId+'"]');
  if(btn){ btn.disabled = true; btn.textContent = '…'; }
  if(!onDone) toast('Generating experience letter for '+esc(name||empId)+'…','info');
  GAS.generateExperienceLetterForEmp(empId, function(r) {
    if(btn){ btn.disabled = false; btn.innerHTML = '&#128196; Generate'; }
    if(!r) { toast('No response from server','error'); if(typeof onDone==='function') onDone(null); return; }
    if(!r.success) { toast('Error: '+r.error,'error'); if(typeof onDone==='function') onDone(null); return; }
    toast('Generated: '+r.refNo,'success');
    if(typeof onDone === 'function') {
      onDone(r.pdf || null);  // bulk mode: pass raw base64 to caller for merging
    } else {
      // Single mode: show download + print modal
      if(r.pdf) _openExpPdfResult(r.pdf, 'Experience_Letter_'+(name||empId).replace(/\s+/g,'_')+'.pdf');
      GAS.call('getHRDocs',[],function(dr){
        if(dr&&dr.success){ APP.hrDocs=dr.data||[]; LtrAgent.render(); LtrAgent.renderExpPanel(); }
      });
    }
  });
}

// ============================================================
// GLOBAL SEARCH — searches ID, Name, Passport No, EID No
// ============================================================
var GlobalSearch = {
  _timer: null,
  _lastQ: '',

  query: function(q) {
    var self = this;
    q = String(q||'').trim();
    var clearBtn = document.getElementById('gsearch-clear');
    if(clearBtn) clearBtn.style.display = q ? 'block' : 'none';
    clearTimeout(this._timer);
    if(!q){ this.hide(); this._lastQ=''; return; }
    this._timer = setTimeout(function(){ self._run(q); }, 180);
  },

  _run: function(q) {
    this._lastQ = q;
    var ql = q.toLowerCase();
    var results = [];

    // Search active employees across 4 fields
    getActiveEmployees().forEach(function(r){
      var id   = String(r.ID||'').toLowerCase();
      var name = String(r.NAME||'').toLowerCase();
      var pp   = String(r['PASSPORT NO']||'').toLowerCase();
      var eid  = String(r['EID NO']||'').toLowerCase();
      if(id.indexOf(ql)>=0 || name.indexOf(ql)>=0 || pp.indexOf(ql)>=0 || eid.indexOf(ql)>=0){
        results.push({type:'emp', data:r});
      }
      if(results.length >= 12) return;
    });

    // Also search onboarding
    APP.onboarding.forEach(function(c){
      if(results.length >= 15) return;
      var name = String(c.FULL_NAME||'').toLowerCase();
      var pp   = String(c.PASSPORT_NO||'').toLowerCase();
      if(name.indexOf(ql)>=0 || pp.indexOf(ql)>=0){
        results.push({type:'ob', data:c});
      }
    });

    this._render(results, q);
  },

  _hl: function(text, q) {
    if(!q || !text) return esc(text);
    var escaped = esc(text);
    var escapedQ = esc(q);
    var re = new RegExp('('+escapedQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
    return escaped.replace(re, '<mark class="hl">$1</mark>');
  },

  _render: function(results, q) {
    var box = document.getElementById('gsearch-results'); if(!box) return;
    box.classList.add('open');

    if(!results.length){
      box.innerHTML = '<div class="gsearch-header"><span>Search Results</span><span>0 found</span></div><div class="gsearch-empty">&#128269; No results for &ldquo;'+esc(q)+'&rdquo;<br><span style="font-size:10.5px">Try ID, name, passport no, or EID</span></div>';
      return;
    }

    var empCount = results.filter(function(r){ return r.type==='emp'; }).length;
    var obCount  = results.filter(function(r){ return r.type==='ob';  }).length;

    var html = '<div class="gsearch-header"><span>Search Results</span><span>'+results.length+' found</span></div>';

    var self = this;
    results.forEach(function(item){
      if(item.type === 'emp'){
        var r = item.data;
        var initials = (r.NAME||'?').substring(0,2).toUpperCase();
        var licCls = {PSBD:'bp',SIRA:'bs',NIL:'bn',OTHER:'bo'}[r['LIC AUTH']||'NIL']||'bn';
        html += '<div class="gsearch-item" onclick="GlobalSearch.showDetail(\''+esc(r.ID||'')+'\')">'+
          '<div class="gsearch-avatar">'+esc(initials)+'</div>'+
          '<div class="gsearch-info">'+
            '<div class="gsearch-name">'+self._hl(r.NAME||'—', q)+'</div>'+
            '<div class="gsearch-meta">ID: '+self._hl(r.ID||'—',q)+' &nbsp;|&nbsp; PP: '+self._hl(r['PASSPORT NO']||'—',q)+' &nbsp;|&nbsp; EID: '+self._hl(r['EID NO']||'—',q)+'</div>'+
          '</div>'+
          '<span class="gsearch-tag badge '+licCls+'">'+esc(r['LIC AUTH']||'NIL')+'</span>'+
        '</div>';
      } else {
        var c = item.data;
        var initials2 = (c.FULL_NAME||'?').substring(0,2).toUpperCase();
        html += '<div class="gsearch-item" style="opacity:.85" onclick="GlobalSearch.showOnboardDetail(\''+esc(c.OB_ID||'')+'\')">'+
          '<div class="gsearch-avatar" style="background:linear-gradient(135deg,#b87000,#8a5200)">'+esc(initials2)+'</div>'+
          '<div class="gsearch-info">'+
            '<div class="gsearch-name">'+self._hl(c.FULL_NAME||'—',q)+'</div>'+
            '<div class="gsearch-meta">Onboarding &nbsp;|&nbsp; PP: '+self._hl(c.PASSPORT_NO||'—',q)+' &nbsp;|&nbsp; Status: '+esc(c.STATUS||'—')+'</div>'+
          '</div>'+
          '<span class="gsearch-tag badge bo">OB</span>'+
        '</div>';
      }
    });

    box.innerHTML = html;
  },

  showDetail: function(empId) {
    var r = APP.master.find(function(x){ return x.ID === empId; });
    if(!r){ toast('Employee not found','error'); return; }
    this.clear();

    var licCls  = {PSBD:'bp',SIRA:'bs',NIL:'bn',OTHER:'bo'}[r['LIC AUTH']||'NIL']||'bn';
    var locColor = r.STATUS==='ABU DHABI'?'#1e4799':r.STATUS==='DUBAI'?'#007a8a':'var(--muted)';
    var initials = (r.NAME||'?').substring(0,2).toUpperCase();
    // Calculate years & months of service from Date of Join to today
    var _calcDays = function(doj){
      if(!doj||doj==='—') return '—';
      var d = doj instanceof Date ? doj : new Date(String(doj).split('/').length===3 ? String(doj).split('/').reverse().join('-') : doj);
      if(isNaN(d.getTime())) return '—';
      var now=new Date(), y=now.getFullYear()-d.getFullYear(), m=now.getMonth()-d.getMonth();
      if(m<0){ y--; m+=12; }
      if(y<0) return '—';
      var parts=[];
      if(y>0) parts.push(y+' yr'+(y>1?'s':''));
      if(m>0) parts.push(m+' mo'+(m>1?'s':''));
      return parts.length?parts.join(' '):'< 1 month';
    };

    var body = document.getElementById('empdetail-body');
    body.innerHTML =
      '<div class="empdetail-head">'+
        '<div class="empdetail-avatar">'+esc(initials)+'</div>'+
        '<div class="empdetail-headinfo">'+
          '<div class="ename">'+esc(r.NAME||'—')+'</div>'+
          '<div class="emeta">'+
            '<span class="badge '+licCls+'" style="margin-right:5px">'+esc(r['LIC AUTH']||'NIL')+'</span>'+
            '<span style="color:'+locColor+';font-weight:700;font-size:11px">'+esc(r.STATUS||'—')+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="empdetail-grid">'+
        '<div class="empdetail-row"><div class="empdetail-label">Employee ID</div><div class="empdetail-val">'+esc(r.ID||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Entity / Company</div><div class="empdetail-val">'+esc(normEnt(r.ENTITY)||'—')+'</div></div>'+
        '<div class="empdetail-row full"><div class="empdetail-label">Full Name</div><div class="empdetail-val">'+esc(r.NAME||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Passport No</div><div class="empdetail-val" style="font-family:monospace;font-size:12px">'+esc(r['PASSPORT NO']||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Emirates ID</div><div class="empdetail-val" style="font-family:monospace;font-size:12px;color:var(--teal)">'+esc(r['EID NO']||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Nationality</div><div class="empdetail-val">'+getFlag(r.NATIONALITY||'')+' '+esc(r.NATIONALITY||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Designation</div><div class="empdetail-val">'+esc(r.DESIGNATION||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Date of Joining</div><div class="empdetail-val">'+fmtD(r['DATE OF JOIN']||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Date of Birth</div><div class="empdetail-val">'+fmtD(r['BIRTH DATE']||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Age</div><div class="empdetail-val">'+esc(r.AGE||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Location / Visa</div><div class="empdetail-val">'+esc(r.STATUS||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Days of Service</div><div class="empdetail-val">'+_calcDays(r['DATE OF JOIN'])+'</div></div>'+
      '</div>';

    // Wire edit button
    var editBtn = document.getElementById('empdetail-edit-btn');
    if(editBtn){
      editBtn.onclick = function(){
        closeM('m-empdetail');
        EmpAgent.openEdit(empId);
      };
    }
    openM('m-empdetail');
  },

  showOnboardDetail: function(obId) {
    var c = APP.onboarding.find(function(x){ return x.OB_ID === obId; });
    if(!c){ toast('Candidate not found','error'); return; }
    this.clear();
    var initials = (c.FULL_NAME||'?').substring(0,2).toUpperCase();
    var body = document.getElementById('empdetail-body');
    body.innerHTML =
      '<div class="empdetail-head">'+
        '<div class="empdetail-avatar" style="background:linear-gradient(135deg,#b87000,#8a5200)">'+esc(initials)+'</div>'+
        '<div class="empdetail-headinfo">'+
          '<div class="ename">'+esc(c.FULL_NAME||'—')+'</div>'+
          '<div class="emeta">'+
            '<span class="badge bo" style="margin-right:5px">Onboarding</span>'+
            '<span class="badge '+(c.STATUS==='Pending'?'bo':c.STATUS==='Transferred'?'bg2':'bn')+'">'+esc(c.STATUS||'—')+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="empdetail-grid">'+
        '<div class="empdetail-row"><div class="empdetail-label">OB ID</div><div class="empdetail-val">'+esc(c.OB_ID||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Position Type</div><div class="empdetail-val">'+esc(c.POSITION_TYPE||'—')+'</div></div>'+
        '<div class="empdetail-row full"><div class="empdetail-label">Full Name</div><div class="empdetail-val">'+esc(c.FULL_NAME||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Passport No</div><div class="empdetail-val" style="font-family:monospace;font-size:12px">'+esc(c.PASSPORT_NO||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Mobile</div><div class="empdetail-val">'+esc(c.MOBILE||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Visa Status</div><div class="empdetail-val">'+esc(c.VISA_STATUS||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Expected Join</div><div class="empdetail-val">'+fmtD(c.EXP_JOIN_DATE||'—')+'</div></div>'+
        '<div class="empdetail-row"><div class="empdetail-label">Date Added</div><div class="empdetail-val">'+fmtD(c.DATE_ADDED||'—')+'</div></div>'+
      '</div>';

    var editBtn = document.getElementById('empdetail-edit-btn');
    if(editBtn){
      editBtn.textContent = '\u270E Edit Candidate';
      editBtn.onclick = function(){
        closeM('m-empdetail');
        OBAgent.openEdit(obId);
      };
    }
    openM('m-empdetail');
  },

  show: function(){
    var q = (document.getElementById('gsearch-input')||{}).value||'';
    if(q.trim()) this._run(q);
  },

  hide: function(){
    var box = document.getElementById('gsearch-results'); if(!box) return;
    box.classList.remove('open');
    box.innerHTML = '';
  },

  clear: function(){
    var inp = document.getElementById('gsearch-input'); if(inp) inp.value='';
    var clr = document.getElementById('gsearch-clear'); if(clr) clr.style.display='none';
    this.hide();
    this._lastQ = '';
  }
};

// Close search on outside click
document.addEventListener('click', function(e){
  var wrap = document.getElementById('gsearch-wrap');
  if(wrap && !wrap.contains(e.target)) GlobalSearch.hide();

var _PUBLIC_FNS = ['loginUser','validateSession','logoutUser','loadAllData',
                   'getPublicJobs','submitApplication','uploadCV'];

// ── Entity Filter — restricts data for ENTITY_MANAGER / VIEWER with specific entities ──
var EntityFilter = {
  // Returns true if this user should see ALL entities
  isUnrestricted: function() {
    var u = APP.user;
    if (!u) return true;
    if (u.role === 'SUPER_ADMIN' || u.role === 'HR_OFFICER') return true;
    return u.entities === 'ALL' || (Array.isArray(u.entities) && u.entities.length === 0);
  },
  // Returns array of allowed entity codes (uppercase, trimmed)
  allowedEntities: function() {
    var u = APP.user;
    if (!u || !Array.isArray(u.entities)) return [];
    return u.entities.map(function(e){ return String(e).toUpperCase().trim(); });
  },
  // Main filter — called after loadAll
  apply: function() {
    if (this.isUnrestricted()) return; // nothing to filter
    var allowed = this.allowedEntities();
    if (!allowed.length) return;
    // Filter master data (ENTITY column)
    APP.master = (APP.master||[]).filter(function(r){
      return allowed.indexOf(String(r.ENTITY||r['COMPANY']||'').toUpperCase().trim()) >= 0;
    });
    // Filter onboarding (ENTITY column)
    APP.onboarding = (APP.onboarding||[]).filter(function(r){
      return allowed.indexOf(String(r.ENTITY||'').toUpperCase().trim()) >= 0;
    });
    // Filter 20DS tracker — match ENTITY or EMP_ID via master set
    var allowedIds = {};
    APP.master.forEach(function(r){ allowedIds[r.ID] = true; });
    APP.dsTracker = (APP.dsTracker||[]).filter(function(r){
      return allowedIds[r.EMP_ID] || allowed.indexOf(String(r.ENTITY||'').toUpperCase().trim()) >= 0;
    });
    // Filter leave (EMP_ID cross-reference)
    APP.leave = (APP.leave||[]).filter(function(r){
      return allowedIds[r.EMP_ID] || allowedIds[r.ID];
    });
  },
  // Test if a single record is accessible (for runtime checks)
  canAccess: function(entityCode) {
    if (this.isUnrestricted()) return true;
    return this.allowedEntities().indexOf(String(entityCode||'').toUpperCase().trim()) >= 0;
  }
};

var GAS={
  call:function(fn,args,ok,err){
    function _onErr(e){
      var msg = e.message || String(e);
      if(msg === 'SESSION_EXPIRED' || msg.indexOf('Session expired') === 0){
        showLoginScreen('Your session has expired. Please log in again.');
        return;
      }
      if(msg.indexOf('ACCESS_DENIED') === 0) toast('Access denied: insufficient permissions','error');
      else toast('Server error: '+msg,'error');
      if(err) err(e);
    }
    if(_PUBLIC_FNS.indexOf(fn) >= 0){
      // Public functions called directly
      google.script.run
        .withSuccessHandler(function(r){ if(ok) ok(r); })
        .withFailureHandler(_onErr)
        [fn].apply(google.script.run, args||[]);
    } else {
      // All protected calls routed through runProtected with session token
      google.script.run
        .withSuccessHandler(function(r){
          if(r && r.error === 'SESSION_EXPIRED'){ showLoginScreen('Session expired. Please log in again.'); return; }
          if(ok) ok(r);
        })
        .withFailureHandler(_onErr)
        .runProtected(APP.token, fn, args||[]);
    }
  },
  loadAll:function(cb){
    google.script.run
      .withSuccessHandler(function(r){
        if(r.user)          APP.user       =r.user;
        if(r.master     &&r.master.success)     APP.master     =r.master.data     ||[];
        if(r.deletions  &&r.deletions.success)  APP.deletions  =r.deletions.data  ||[];
        if(r.onboarding &&r.onboarding.success) APP.onboarding =r.onboarding.data ||[];

        if(r.summary    &&r.summary.success)    APP.summary    =r.summary.data    ||[];
        if(r.dsTracker  &&r.dsTracker.success)  APP.dsTracker  =r.dsTracker.data  ||[];
        if(r.stepConfig &&r.stepConfig.success) APP.stepConfig =r.stepConfig.data ||[];
        APP.config=r.config||{}; APP.loaded=true;
        EntityFilter.apply();
        // Apply dynamic step config to DSAgent — overrides hardcoded defaults if sheet has data
        if (APP.stepConfig && APP.stepConfig.length) DSAgent.applyStepConfig(APP.stepConfig);
        if(cb) cb();
      })
      .withFailureHandler(function(e){ toast('Load error: '+(e.message||e),'error'); })
      .loadAllData(APP.token);
  },

      if(ents.length && ents.indexOf(normEnt(r.ENTITY))===-1) return false;

  goPage:function(table,page){
    if(table==='master') this._masterPage=page;
    else this._activePage=page;
    this.render(false);
  },
  sortByActive:function(col){
    if(this._sortActive.col===col) this._sortActive.dir=this._sortActive.dir==='asc'?'desc':'asc';
    else{ this._sortActive.col=col; this._sortActive.dir=col==='ID'?'desc':'asc'; }
    this._activePage=0;
    this.render(false);
  },
  _renderPagination:function(total,page,pageSize,pgnId,table){
    var pgn=document.getElementById(pgnId); if(!pgn) return;
    if(total<=pageSize){ pgn.innerHTML=''; return; }
    var totalPages=Math.ceil(total/pageSize);
    var from=page*pageSize+1, to=Math.min((page+1)*pageSize,total);
    var btn=function(p,label,active,disabled){
      return '<button class="pgbtn'+(active?' active':'')+(disabled?' disabled':'')+'" '+(disabled?'disabled':'')+' onclick="EmpAgent.goPage(\''+table+'\','+p+')">'+label+'</button>';
    };
    var html=btn(page-1,'&#8592;',false,page===0);
    // build page list with ellipsis
    var pages=[];
    if(totalPages<=7){ for(var i=0;i<totalPages;i++) pages.push(i); }
    else{
      pages=[0];
      if(page>3) pages.push(-1);
      for(var i=Math.max(1,page-2);i<=Math.min(totalPages-2,page+2);i++) pages.push(i);
      if(page<totalPages-4) pages.push(-1);
      pages.push(totalPages-1);
    }
    pages.forEach(function(p){
      html+= p===-1
        ? '<span style="padding:0 3px;color:var(--muted2);line-height:28px">…</span>'
        : btn(p,p+1,p===page,false);
    });
    html+='<span style="font-size:11px;color:var(--muted);padding:0 8px;white-space:nowrap">'+from+'–'+to+' / '+total+'</span>';
    html+=btn(page+1,'&#8594;',false,page===totalPages-1);
    pgn.innerHTML=html;
  },

    GAS.transferToMaster(obId,empData,function(result){

    var data=Object.assign({},c,{STATUS:'Cancelled'});

      if(!result||!result.success){ toast('Error','error'); return; }

      set('ltf-name',   emp.NAME||'');
      set('ltf-des',    emp['DESIGNATION']||'');

      set('ltf-des',''); set('ltf-pp',''); set('ltf-entity',''); set('ltf-doj','');
    }
  },
  issue:function(){
    var type =document.getElementById('ltf-type').value;
    var empId=document.getElementById('ltf-empid').value.trim();
    if(!type)  { toast('Select letter type first','error'); return; }
    if(!empId) { toast('Employee ID required','error'); return; }
    if(type==='Salary Certificate'){
      if(!document.getElementById('ltf-sal').value.trim()){ toast('Monthly Salary required','error'); return; }
      if(!document.getElementById('ltf-bank').value.trim()){ toast('Bank Name required','error'); return; }
      if(!document.getElementById('ltf-addr').value.trim()){ toast('Address required','error'); return; }
    }
    var get=function(id){ var el=document.getElementById(id); return el?el.value.trim():''; };
    var ref='HR-'+Date.now().toString().slice(-8);
    var data={
      REF_NO:      ref,
      EMP_ID:      empId,
      EMP_NAME:    get('ltf-name'),
      LETTER_TYPE: type,
      ISSUE_DATE:  get('ltf-date'),
      ISSUED_BY:   get('ltf-by'),
      NOTES:       get('ltf-notes'),
      SALARY:      get('ltf-sal'),
      BANK_NAME:   get('ltf-bank'),
      ADDRESS:     get('ltf-addr'),
      DESIGNATION: get('ltf-des'),
      PASSPORT_NO: get('ltf-pp'),
      ENTITY:      get('ltf-entity'),
      DATE_OF_JOIN:get('ltf-doj')
    };
    var key=type.toUpperCase().replace(/[^A-Z0-9]/g,'_');
    var hasTemplate=!!(APP.config['LTEMPL_'+key+'_DRIVE']||APP.config['LTEMPL_'+key+'_BODY']);
    var btn=document.getElementById('ltf-gen-btn');
    if(btn){ btn.disabled=true; btn.textContent='Generating…'; }
    GAS.generateAndIssueLetter(data,function(result){
      if(btn){ btn.disabled=false; btn.textContent=hasTemplate?'Generate Letter':'Issue (No PDF)'; }
      if(!result||!result.success){ toast('Error: '+(result?result.error:'Unknown'),'error'); return; }
      APP.hrDocs.unshift({REF_NO:ref,EMP_ID:empId,EMP_NAME:data.EMP_NAME,LETTER_TYPE:type,ISSUE_DATE:data.ISSUE_DATE,ISSUED_BY:data.ISSUED_BY,NOTES:data.NOTES});
      closeM('m-ltr'); LtrAgent.render();
      if(result.pdf){
        var fname = type.replace(/\s+/g,'-')+'_'+empId+'_'+ref+'.pdf';
        try {
          var bytes = new Uint8Array(atob(result.pdf).split('').map(function(c){ return c.charCodeAt(0); }));
          _openPdfResult(URL.createObjectURL(new Blob([bytes],{type:'application/pdf'})), fname);
        } catch(e) { toast('Error opening PDF: '+e.message,'error'); }
      } else {
        toast(type+' issued ('+ref+') — no PDF template configured','info');
      }
    });
  },
  delEntry:function(ref){ APP.hrDocs=APP.hrDocs.filter(function(l){ return l.REF_NO!==ref; }); toast('Removed locally','warning'); this.render(); },

  // Renders the "Experience Letters — Resigned Employees" panel in HR Letters
  renderExpPanel:function(){

    var cnt = document.getElementById('exp-ltr-cnt');

      tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">No resignation records found.</td></tr>';

      var actionHtml = '<button class="btn btn-gold btn-sm" style="font-size:10.5px;white-space:nowrap" '+
          'data-exltr="'+esc(r.EMP_ID||'')+'" '+
          'onclick="genExpLetter(\''+esc(r.EMP_ID||'')+'\',\''+esc((r.FULL_NAME||'').replace(/'/g,''))+'\')">'+
          '&#128196; Generate</button>';
      return '<tr>'+
        chkTd+
        '<td style="font-family:monospace;font-size:11px;font-weight:600;color:var(--navy)">'+esc(r.EMP_ID||'—')+'</td>'+
        '<td style="font-weight:600">'+esc(r.FULL_NAME||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--muted)">'+esc(r.DESIGNATION||'—')+'</td>'+
        '<td style="font-size:11px">'+fmtD(r.DELETED_DATE||'—')+'</td>'+

  updateBulkCount: function() {
    var checked = document.querySelectorAll('.exp-chk:checked');
    var btn = document.getElementById('bulk-exp-btn');
    var cnt = document.getElementById('bulk-exp-count');
    if(cnt) cnt.textContent = checked.length;
    if(btn) btn.style.display = checked.length ? '' : 'none';
  },
  toggleSelectAll: function(checked) {
    document.querySelectorAll('.exp-chk').forEach(function(c){ c.checked = checked; });
    this.updateBulkCount();
  },
  generateBulk: function() {
    var items = [];
    document.querySelectorAll('.exp-chk:checked').forEach(function(c){
      items.push({id: c.dataset.empid, name: c.dataset.name});
    });
    if(!items.length){ toast('No employees selected','error'); return; }
    var btn = document.getElementById('bulk-exp-btn');
    if(btn) btn.disabled = true;
    toast('Generating '+items.length+' letter'+(items.length>1?'s':'')+'…','info');
    var idx = 0, collectedPdfs = [];
    function next() {
      if(idx >= items.length){
        if(!collectedPdfs.length){ toast('No PDFs generated','error'); if(btn) btn.disabled=false; return; }
        toast('Merging '+collectedPdfs.length+' PDFs…','info');
        var mFile = 'Experience_Letters_'+collectedPdfs.length+'_employees.pdf';
        _mergeBulkExpPdfs(collectedPdfs, function(url){
          _openPdfResult(url, mFile);
          if(btn){ btn.disabled=false; btn.style.display='none'; }
          var sa=document.getElementById('exp-sel-all'); if(sa) sa.checked=false;
          GAS.call('getHRDocs',[],function(dr){
            if(dr&&dr.success){ APP.hrDocs=dr.data||[]; LtrAgent.render(); LtrAgent.renderExpPanel(); }
          });
        });
        return;
      }
      var item = items[idx++];
      toast('('+(idx)+'/'+items.length+') '+esc(item.name)+'…','info');
      genExpLetter(item.id, item.name, function(pdf){ if(pdf) collectedPdfs.push(pdf); next(); });
    }
    next();
  }
};

var ExcelAgent={
  _MONTHS:['January','February','March','April','May','June','July','August','September','October','November','December'],
  _MONTHS_SHORT:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],

  // Called when navigating to Active Employees view — populates dynamic dropdowns
  populateFilters:function(){
    var active=getActiveEmployees();

    // Joining years — extracted from DATE OF JOIN
    // Joining years — build multi-select options
    var years={};
    active.forEach(function(r){
      var m=String(r['DATE OF JOIN']||'').match(/(\d{4})/);
      if(m) years[m[1]]=true;
    });
    MultiSel.build('ms-xls-year-drop', Object.keys(years).sort().reverse().map(function(y){ return {value:y,label:y}; }), 'ms-xls-year');

    // Designations — build multi-select options
    var desigs={};
    active.forEach(function(r){
      var d=String(r.DESIGNATION||'').trim();
      if(d&&d!=='Unknown'&&d!=='nan') desigs[d]=true;
    });
    MultiSel.build('ms-xls-desig-drop', Object.keys(desigs).sort().map(function(d){ return {value:d,label:d}; }), 'ms-xls-desig');
  },

  // Parse month number (1–12) from any date string
  _month:function(s){
    if(!s||s==='—') return null;
    var m=String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})$/); if(m) return parseInt(m[2],10);
    m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);        if(m) return parseInt(m[2],10);
    var d=new Date(s); if(!isNaN(d)) return d.getMonth()+1;
    return null;
  },

  // Parse 4-digit year from any date string
  _year:function(s){
    var m=String(s||'').match(/(\d{4})/); return m?m[1]:null;
  },

  export:function(){
    if(typeof XLSX==='undefined'){ toast('Excel library still loading — please retry in a moment.','error'); return; }

    var bms =MultiSel.get('ms-xls-birth').map(function(v){ return parseInt(v,10); });
    var jys =MultiSel.get('ms-xls-year');
    var dess=MultiSel.get('ms-xls-desig');
    var orgs=MultiSel.get('ms-xls-org');

    // Begin with the same filtered list used by the active table
    var list=EmpAgent._filteredActive();

    // Apply multi-select export filters — each filter: if any selected, record must match one of them
    if(bms.length)  list=list.filter(function(r){ return bms.indexOf(ExcelAgent._month(r['BIRTH DATE']||''))!==-1; });
    if(jys.length)  list=list.filter(function(r){ return jys.indexOf(ExcelAgent._year(r['DATE OF JOIN']||''))!==-1; });
    if(dess.length) list=list.filter(function(r){ return dess.indexOf(String(r.DESIGNATION||'').trim())!==-1; });
    if(orgs.length) list=list.filter(function(r){ return orgs.indexOf(normEnt(r.ENTITY))!==-1; });

    if(!list.length){ toast('No records match the selected filters.','error'); return; }

    // Full column set from master sheet
    var COLS=[
      {h:'Emp ID',          k:'ID'},
      {h:'Full Name',       k:'NAME'},
      {h:'Designation',     k:'DESIGNATION'},
      {h:'Date of Joining', k:'DATE OF JOIN',  fmt:true},
      {h:'Date of Birth',   k:'BIRTH DATE',    fmt:true},
      {h:'Age',             k:'AGE'},
      {h:'Nationality',     k:'NATIONALITY'},
      {h:'Organization',    k:'ENTITY',        norm:true},
      {h:'License Auth',    k:'LIC AUTH'},
      {h:'Location / Visa', k:'STATUS'},
      {h:'Passport No',     k:'PASSPORT NO'},
      {h:'Emirates ID',     k:'EID NO'},
      {h:'Email',           k:'EMAIL'},
      {h:'Days of Service', k:'Days'},
      {h:'Visa',            k:'VISA'}
    ];

    var headers=COLS.map(function(c){ return c.h; });
    var rows=list.map(function(r){
      return COLS.map(function(c){
        var v=r[c.k]!=null?String(r[c.k]):'';
        if(c.fmt&&v) v=fmtD(v);
        if(c.norm&&v) v=normEnt(v)||v;
        return v;
      });
    });

    var wb=XLSX.utils.book_new();
    var ws=XLSX.utils.aoa_to_sheet([headers].concat(rows));
    ws['!cols']=[
      {wch:10},{wch:28},{wch:24},{wch:14},{wch:14},
      {wch:6},{wch:14},{wch:10},{wch:12},{wch:14},
      {wch:14},{wch:20},{wch:28},{wch:8},{wch:14}
    ];
    ws['!freeze']={xSplit:0,ySplit:1,topLeftCell:'A2',activeCell:'A2',sqref:'A2'};
    XLSX.utils.book_append_sheet(wb,ws,'Active Manpower');

    // Build descriptive filename
    var parts=['Active_Manpower'];
    if(orgs.length)  parts.push(orgs.join('-'));
    if(bms.length)   parts.push('Birth_'+bms.map(function(n){ return ExcelAgent._MONTHS_SHORT[n-1]; }).join('-'));
    if(jys.length)   parts.push('Join_'+jys.join('-'));
    if(dess.length===1) parts.push(dess[0].replace(/[^a-zA-Z0-9]/g,'_').substring(0,18));
    parts.push(new Date().toISOString().split('T')[0]);
    var filename=parts.join('_')+'.xlsx';

    var out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    var blob=new Blob([out],{type:'application/octet-stream'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);

    toast(list.length.toLocaleString()+' records exported \u2192 '+filename,'success');
  }
};

  _refresh20DS: function() {

    var st = function(id,cls,txt){ var el=document.getElementById(id); if(!el) return; el.className='ktrend '+cls; el.textContent=txt; };

    var now = new Date(); var curMonth = now.getMonth(); var curYear = now.getFullYear();
    var active     = ds.filter(function(r){ return r.CANCELLED !== 'TRUE'; });
    var inprog     = active.filter(function(r){ return r.OB_COMPLETE !== 'TRUE'; });
    var overstage  = active.filter(function(r){ return r.OB_COMPLETE !== 'TRUE' && parseInt(r.TOTAL_DAYS_ELAPSED||0,10) > 20; });
    var completed  = active.filter(function(r){
      if (r.OB_COMPLETE !== 'TRUE') return false;
      var ms = DSAgent._completionMs(r);
      if (!ms) return false;
      var d = new Date(ms);
      return d.getMonth() === curMonth && d.getFullYear() === curYear;
    });

    var today = new Date(); today.setHours(0,0,0,0);
    var nsi = inprog.filter(function(r){
      var n = r.STEP_NSI || {};
      if ((n.status || '') !== 'Scheduled') return false;
      var cd = n.complete_date ? new Date(n.complete_date) : null;
      return !cd || isNaN(cd) || cd >= today;
    });

    var waitAssd = inprog.filter(function(r){
      var eid = r.STEP_EID || {};
      return (eid.status === 'Done' || eid.status === 'Fit') && (r.STEP_ASSD || {}).status !== 'Done';
    });
    var waitEid = inprog.filter(function(r){
      var eid = r.STEP_EID || {};
      return eid.status !== 'Done' && eid.status !== 'Fit';
    });

// ALERT AGENT — notification bell + panel
// ============================================================
var AlertAgent = {
  _open: false,
  toggle: function() { this._open ? this.close() : this.open(); },
  open: function() {
    this._open = true;
    this.refresh();
    var p = document.getElementById('notif-panel'); if(p) p.classList.add('open');
    var b = document.getElementById('notif-backdrop'); if(b) b.classList.add('open');
  },
  close: function() {
    this._open = false;
    var p = document.getElementById('notif-panel'); if(p) p.classList.remove('open');
    var b = document.getElementById('notif-backdrop'); if(b) b.classList.remove('open');
  },
  refresh: function() {
    var alerts = [];
    var now = new Date();

    // 1. Over-stage 20DS records
    var overStage = (APP.dsTracker||[]).filter(function(r){ return r.CANCELLED!=='TRUE' && r.OB_COMPLETE!=='TRUE' && parseInt(r.TOTAL_DAYS_ELAPSED||0,10) > 20; });
    if (overStage.length) alerts.push({ group:'20DS Tracker', icon:'🔴', title: overStage.length + ' Over-Stage Record'+(overStage.length>1?'s':''), sub:'Onboarding past 20-day limit — requires action', nav:'20dstracker' });

    // 2. Pending leaves
    var pendLeave = (APP.leave||[]).filter(function(r){ return r.STATUS==='Pending'; });
    if (pendLeave.length) alerts.push({ group:'Leave', icon:'🟡', title: pendLeave.length + ' Leave Request'+(pendLeave.length>1?'s':'')+' Pending', sub:'Awaiting HR approval', nav:'leave' });

    // 3. Expiring documents (EID/Visa in next 30 days)
    var expiring = (APP.master||[]).filter(function(r){
      var fields = [r['EID EXPIRY']||r['EID NO'],r['VISA EXPIRY']||r['VISA']];
      return fields.some(function(f){
        if(!f) return false;
        var d = new Date(f); if(isNaN(d)) return false;
        var diff = (d - now) / 86400000;
        return diff >= 0 && diff <= 30;
      });
    });
    if (expiring.length) alerts.push({ group:'Documents', icon:'🟠', title: expiring.length + ' Document'+(expiring.length>1?'s':'')+' Expiring Soon', sub:'EID or Visa expiring within 30 days', nav:'employees' });

    // 4. Pending onboarding transfers
    var pendOB = (APP.onboarding||[]).filter(function(r){ return r.STATUS==='Pending'; });
    if (pendOB.length) alerts.push({ group:'Onboarding', icon:'🔵', title: pendOB.length + ' Candidate'+(pendOB.length>1?'s':'')+' Pending Transfer', sub:'Ready to transfer to Master Data', nav:'onboarding' });

    // Update bell dot
    var dot = document.getElementById('notif-dot');
    if (dot) dot.style.display = alerts.length ? '' : 'none';

    // Render panel
    var body = document.getElementById('notif-panel-body');
    if (!body) return;
    if (!alerts.length) { body.innerHTML = '<div class="notif-empty">&#10003; No alerts right now</div>'; return; }
    body.innerHTML = alerts.map(function(a) {
      return '<div class="notif-group">'+
        '<div class="notif-group-label">'+esc(a.group)+'</div>'+
        '<div class="notif-item" onclick="AlertAgent.close();navigate(\''+a.nav+'\')">'+
          '<div class="notif-item-icon">'+a.icon+'</div>'+
          '<div class="notif-item-text">'+
            '<div class="notif-item-title">'+esc(a.title)+'</div>'+
            '<div class="notif-item-sub">'+esc(a.sub)+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  },
  // Call this after any data refresh to update the bell dot
  updateBell: function() {
    var overStage = (APP.dsTracker||[]).filter(function(r){ return r.CANCELLED!=='TRUE' && r.OB_COMPLETE!=='TRUE' && parseInt(r.TOTAL_DAYS_ELAPSED||0,10) > 20; }).length;
    var pendLeave = (APP.leave||[]).filter(function(r){ return r.STATUS==='Pending'; }).length;
    var pendOB = (APP.onboarding||[]).filter(function(r){ return r.STATUS==='Pending'; }).length;
    var dot = document.getElementById('notif-dot');
    if (dot) dot.style.display = (overStage + pendLeave + pendOB > 0) ? '' : 'none';
  }
};

// ============================================================
// OFFER LETTER — Uses REAL PSBD / SIRA templates from Google Drive
// EXACT fill coordinates (verified via pdfplumber baseline extraction):
//   Page size: 595.32 x 841.92  (A4)
//   pdf-lib uses bottom-left origin
//
//   DATE  value: x=453.000, y=733.736  (Helvetica Regular 10pt)
//   NAME  value: x=144.860, y=715.116  (Helvetica Bold 10pt)
//   POS   value: x=144.860, y=699.876  (Helvetica Bold 10pt)
//   PP NO value: x=370.000, y=699.876  (Helvetica Bold 10pt)
//
//   Both PSBD & SIRA templates share identical field coordinates.
//   Only salary (7) and location (8) differ between templates.
// ============================================================
// ============================================================
// OFFER LETTER — EMBEDDED templates, exact PyMuPDF coordinates
// Templates are base64 strings served from OfferLetterHelper.gs
// Fetched once, cached in memory for instant re-use
//
// EXACT COORDINATES (PyMuPDF span["origin"] method):
//   DATE  → x=453.520  y=733.740  Helvetica Regular 10.020pt
//   NAME  → x=144.860  y=715.120  Helvetica Bold    10.020pt
//   POS   → x=144.860  y=699.880  Helvetica Bold    10.020pt
//   PP NO → x=376.000  y=699.880  Helvetica Bold    10.020pt
//   (y is pdf-lib bottom-left: y_pdflib = 841.92 - y_mupdf)
// ============================================================
var olType = 'PSBD';
var OL_CACHE = {}; // {PSBD: base64str, SIRA: base64str}

function selectOL(t){
  olType = t;
  document.getElementById('ol-psbd').className = 'type-card'+(t==='PSBD'?' active-psbd':'');
  document.getElementById('ol-sira').className = 'type-card'+(t==='SIRA'?' active-sira':'');
  document.getElementById('ol-pos').textContent = t==='PSBD'?'SECURITY GUARD':'SECURITY GUARD - SIRA';
  var btn = document.getElementById('ol-btn');
  btn.className = t==='PSBD'?'btn btn-gold':'btn btn-primary';
  btn.textContent = 'Download '+t+' Offer Letter';
}

function openOLModal(){
  document.getElementById('ol-name').value = '';
  document.getElementById('ol-pp').value   = '';
  document.getElementById('ol-date').textContent = todayDisplay();
  document.getElementById('ol-msg').textContent  = '';
  selectOL('PSBD');
  openM('m-ol');
}

function downloadOL(){
  var name = document.getElementById('ol-name').value.trim();
  var pp   = document.getElementById('ol-pp').value.trim();
  var msg  = document.getElementById('ol-msg');
  if(!name){ msg.style.color='var(--red)'; msg.textContent='Enter full name.'; return; }
  if(!pp)  { msg.style.color='var(--red)'; msg.textContent='Enter passport number.'; return; }

  var btn = document.getElementById('ol-btn');
  btn.disabled = true;
  msg.style.color = 'var(--teal)';

  // DD/MM/YYYY
  var now = new Date();
  var dateStr = ('0'+now.getDate()).slice(-2)+'/'+('0'+(now.getMonth()+1)).slice(-2)+'/'+now.getFullYear();

  // Use cache if available — instant
  if(OL_CACHE[olType]){
    msg.textContent = 'Generating...';
    btn.textContent = 'Generating...';
    _fillAndDownload(OL_CACHE[olType], name, pp, dateStr, msg, btn);
    return;
  }

  // Fetch from GAS (embedded in OfferLetterHelper.gs — very fast, no Drive latency)
  msg.textContent = 'Loading template...';
  btn.innerHTML   = '<span class="spin-sm"></span> Loading...';

  GAS.call('getOfferLetterTemplate', [olType], function(result){
    if(!result || !result.success){
      btn.disabled = false; btn.textContent = 'Download '+olType+' Offer Letter';
      msg.style.color = 'var(--red)';
      msg.textContent = 'Error: '+(result ? result.error : 'Could not load template');
      return;
    }
    OL_CACHE[olType] = result.data; // cache for instant re-use
    msg.textContent  = 'Filling fields...';
    btn.textContent  = 'Filling fields...';
    _fillAndDownload(result.data, name, pp, dateStr, msg, btn);
  });
}

// ============================================================
// FILL TEMPLATE — pdf-lib overlays 4 fields on USG template
// ============================================================
function _fillAndDownload(templateB64, name, pp, dateStr, msg, btn){
  // base64 → Uint8Array
  var binary = atob(templateB64);
  var bytes  = new Uint8Array(binary.length);
  for(var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

  PDFLib.PDFDocument.load(bytes).then(function(pdfDoc){
    var page = pdfDoc.getPages()[0];

    return Promise.all([
      pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold),
      pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica)
    ]).then(function(fonts){
      var fBold = fonts[0];
      var fReg  = fonts[1];
      var black = PDFLib.rgb(0, 0, 0);
      var SZ    = 10.020; // matches Tahoma 10.020pt in original

      // ── POSITION label (SIRA adds "- SIRA" suffix) ──
      var posText = (olType === 'SIRA') ? 'SECURITY GUARD - SIRA' : 'SECURITY GUARD';

      // DATE  → Helvetica Regular, x=453.520, y=733.740
      page.drawText(dateStr, {
        x: 453.520, y: 733.740, size: SZ, font: fReg, color: black
      });

      // NAME  → Helvetica Bold,    x=144.860, y=715.120
      page.drawText(name.toUpperCase(), {
        x: 144.860, y: 715.120, size: SZ, font: fBold, color: black
      });

      // POS   → Helvetica Bold,    x=144.860, y=699.880
      page.drawText(posText, {
        x: 144.860, y: 699.880, size: SZ, font: fBold, color: black
      });

      // PP NO → Helvetica Bold,    x=376.000, y=699.880
      page.drawText(pp.toUpperCase(), {
        x: 376.000, y: 699.880, size: SZ, font: fBold, color: black
      });

      return pdfDoc.save();
    });

  }).then(function(outBytes){
    var blob = new Blob([outBytes], {type:'application/pdf'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = 'OfferLetter_' + olType + '_' + name.replace(/\s+/g,'_') + '.pdf';
    a.click();
    URL.revokeObjectURL(url);

    btn.disabled = false;
    btn.textContent = 'Download ' + olType + ' Offer Letter';
    msg.textContent = 'Downloaded successfully!';
    Logger.write('OfferLetterAgent', 'GENERATE', olType + ' | ' + name + ' | ' + pp);

    // Log to HR Docs locally
    APP.hrDocs.unshift({
      REF_NO: 'OL-'+Date.now().toString().slice(-8),
      EMP_ID: 'ONBOARD', EMP_NAME: name,
      LETTER_TYPE: 'Offer Letter', ISSUE_DATE: today(),
      ISSUED_BY: APP.config.hr_officer||'HR',
      NOTES: olType + ' | PP: ' + pp
    });

  }).catch(function(e){
    btn.disabled = false;
    btn.textContent = 'Download ' + olType + ' Offer Letter';
    msg.style.color = 'var(--red)';
    msg.textContent = 'PDF Error: ' + e.message;
    console.error('Offer letter error:', e);
  });
}

var ProfileAgent = {
  _nameEditing: false,

  load: function() {

    var initials = (u.name||u.email||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase() || '?';

      EMPLOYEE:{label:'Employee',color:'var(--gold)'}
    };
    var rm = roleMeta[u.role] || {label:u.role||'—',color:'var(--muted)'};
    var rb = document.getElementById('prof-role-badge');
    if(rb){ rb.textContent = rm.label; rb.style.color = rm.color; }
    setText('prof-email', u.email||'—');
    setText('prof-name-display', u.name||'—');
    var entEl = document.getElementById('prof-entities');
    if(entEl){
      var ents = u.entities;
      entEl.textContent = (ents === 'ALL' || (Array.isArray(ents) && ents.length === 0)) ? 'All Entities' :
        Array.isArray(ents) ? ents.join(', ') : String(ents||'—');
    }
    var banner = document.getElementById('prof-must-change-banner');
    if(banner) banner.style.display = u.mustChange ? 'block' : 'none';
    var empSec = document.getElementById('ss-emp-section');
    if(empSec) empSec.style.display = (u.role === 'EMPLOYEE') ? 'block' : 'none';
    ['prof-pwd-current','prof-pwd-new','prof-pwd-confirm'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
    var bar=document.getElementById('prof-pwd-bar'); if(bar) bar.style.width='0%';
    if(u.role === 'EMPLOYEE') SelfServiceAgent.load();
    if(u.mustChange) this._showForcedChange();
  },

  _showForcedChange: function() {
    var el1=document.getElementById('mc-pwd-new'), el2=document.getElementById('mc-pwd-confirm');
    if(el1) el1.value=''; if(el2) el2.value='';
    s('must-change-backdrop','display:block');
    s('must-change-modal','display:block');
  },

  forcedPasswordChange: function() {
    var np = document.getElementById('mc-pwd-new') ? document.getElementById('mc-pwd-new').value : '';
    var cp = document.getElementById('mc-pwd-confirm') ? document.getElementById('mc-pwd-confirm').value : '';
    if(!np || np.length < 6) { toast('Password must be at least 6 characters','error'); return; }
    if(np !== cp) { toast('Passwords do not match','error'); return; }
    call('changeMyPassword', ['__MUST_CHANGE__', np], function(r){
      if(!r||!r.success){ toast(r&&r.error||'Failed to change password','error'); return; }
      APP.user.mustChange = false;
      s('must-change-backdrop','display:none');
      s('must-change-modal','display:none');
      toast('Password updated. Welcome!','success');
    });
  },

  toggleNameEdit: function() {
    this._nameEditing = !this._nameEditing;
    var row = document.getElementById('prof-name-edit-row');
    if(row) row.style.display = this._nameEditing ? 'block' : 'none';
    if(this._nameEditing) {
      var inp = document.getElementById('prof-name-input');
      if(inp){ inp.value = (APP.user && APP.user.name) || ''; inp.focus(); }
    }
  },

  saveName: function() {
    var val = document.getElementById('prof-name-input') ? document.getElementById('prof-name-input').value.trim() : '';
    if(!val){ toast('Name cannot be empty','error'); return; }
    call('updateMyProfile', [val], function(r){
      if(!r||!r.success){ toast(r&&r.error||'Failed','error'); return; }
      if(APP.user) APP.user.name = val;
      setText('prof-name-display', val);
      var sn=document.getElementById('sb-user-name'); if(sn) sn.textContent=val;
      var initials=val.split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
      var av=document.getElementById('prof-avatar'); if(av) av.textContent=initials;
      var sav=document.getElementById('sb-avatar-initials'); if(sav) sav.textContent=initials;
      ProfileAgent.toggleNameEdit();
      toast('Display name updated','success');
    });
  },

  checkPwdStrength: function() {
    var v = document.getElementById('prof-pwd-new') ? document.getElementById('prof-pwd-new').value : '';
    var score = 0;
    if(v.length >= 6) score++;
    if(v.length >= 10) score++;
    if(/[A-Z]/.test(v)) score++;
    if(/[0-9]/.test(v)) score++;
    if(/[^A-Za-z0-9]/.test(v)) score++;
    var colors = ['var(--red)','var(--red)','var(--gold)','var(--gold)','var(--green)'];
    var pct = Math.round((score/5)*100);
    var bar=document.getElementById('prof-pwd-bar');
    if(bar){ bar.style.width=pct+'%'; bar.style.background=colors[Math.max(0,score-1)]||'var(--border)'; }
  },

  changePassword: function() {
    var cur  = document.getElementById('prof-pwd-current') ? document.getElementById('prof-pwd-current').value : '';
    var np   = document.getElementById('prof-pwd-new') ? document.getElementById('prof-pwd-new').value : '';
    var conf = document.getElementById('prof-pwd-confirm') ? document.getElementById('prof-pwd-confirm').value : '';
    if(!cur)  { toast('Enter your current password','error'); return; }
    if(!np || np.length < 6) { toast('New password must be at least 6 characters','error'); return; }
    if(np !== conf) { toast('Passwords do not match','error'); return; }
    call('changeMyPassword', [cur, np], function(r){
      if(!r||!r.success){ toast(r&&r.error||'Failed','error'); return; }
      if(APP.user) APP.user.mustChange = false;
      var banner=document.getElementById('prof-must-change-banner'); if(banner) banner.style.display='none';
      ['prof-pwd-current','prof-pwd-new','prof-pwd-confirm'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
      var bar=document.getElementById('prof-pwd-bar'); if(bar) bar.style.width='0%';
      toast('Password changed successfully','success');
    });
  },
};

// ============================================================
// USER MANAGEMENT AGENT
// ============================================================
var UserMgmtAgent = {
  _data: [],
  _tab: 'users',
  _tempPwd: '',

  ROLE_META: {
    SUPER_ADMIN:    {label:'Super Admin',    color:'var(--navy)',   bg:'rgba(30,71,153,.12)'},
    HR_OFFICER:     {label:'HR Officer',     color:'var(--teal)',   bg:'rgba(0,122,138,.12)'},
    ENTITY_MANAGER: {label:'Entity Manager', color:'var(--purple)', bg:'rgba(78,66,184,.12)'},
    STAFF:          {label:'Staff',           color:'var(--muted)',  bg:'rgba(82,98,120,.10)'},
    EMPLOYEE:       {label:'Employee',       color:'var(--gold)',   bg:'rgba(184,112,0,.12)'},
  },

  load: function() {
    var self = this;
    call('getUsers', [], function(r) {
      if (!r || !r.success) { toast('Could not load users', 'error'); return; }
      self._data = r.data || [];
      self.render();
      self._renderStats();
    });
  },

  setTab: function(tab) {
    this._tab = tab;
    s('um-tab-users',  tab === 'users'  ? 'display:block' : 'display:none');
    s('um-tab-matrix', tab === 'matrix' ? 'display:block' : 'display:none');
    s('um-tab-users-btn',  'font-weight:' + (tab === 'users'  ? '700' : '400'));
    s('um-tab-matrix-btn', 'font-weight:' + (tab === 'matrix' ? '700' : '400'));
    if (tab === 'matrix') this._renderMatrix();
  },

  _renderStats: function() {
    var data = this._data;
    var total = data.length;
    var active = data.filter(function(u){ return String(u.ACTIVE||'').toUpperCase() === 'TRUE'; }).length;
    var byRole = {};
    data.forEach(function(u){ byRole[u.ROLE] = (byRole[u.ROLE]||0) + 1; });
    var self = this;
    var cards = [
      {label:'Total Users', val:total, icon:'&#128101;', color:'var(--navy)'},
      {label:'Active', val:active, icon:'&#9989;', color:'var(--green)'},
      {label:'Inactive', val:total-active, icon:'&#9940;', color:'var(--red)'},
    ];
    Object.keys(self.ROLE_META).forEach(function(role){
      if (byRole[role]) cards.push({label:self.ROLE_META[role].label, val:byRole[role], icon:'&#128100;', color:self.ROLE_META[role].color});
    });
    var el = document.getElementById('um-stats-row');
    if (!el) return;
    el.innerHTML = cards.map(function(c){
      return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px;min-width:110px">'+
        '<span style="font-size:18px">'+c.icon+'</span>'+
        '<div><div style="font-size:18px;font-weight:700;color:'+c.color+'">'+c.val+'</div>'+
        '<div style="font-size:10px;color:var(--muted);white-space:nowrap">'+c.label+'</div></div>'+
      '</div>';
    }).join('');
  },

  render: function() {
    var q    = (document.getElementById('um-q') ? document.getElementById('um-q').value : '').toLowerCase();
    var role = document.getElementById('um-filter-role') ? document.getElementById('um-filter-role').value : '';
    var self = this;
    var rows = this._data.filter(function(u) {
      if (role && u.ROLE !== role) return false;
      if (q && String(u.EMAIL+' '+u.DISPLAY_NAME).toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
    var myEmail = APP.user && APP.user.email ? APP.user.email.toLowerCase() : '';
    var html = rows.map(function(u) {
      var meta    = self.ROLE_META[u.ROLE] || {label:u.ROLE, color:'var(--muted)', bg:'rgba(0,0,0,.06)'};
      var isActive = String(u.ACTIVE||'').toUpperCase() === 'TRUE';
      var isMe     = String(u.EMAIL||'').toLowerCase() === myEmail;
      var entStr   = String(u.ENTITIES||'ALL');
      var entChips = entStr.toUpperCase() === 'ALL'
        ? '<span style="background:rgba(0,122,138,.1);color:var(--teal);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:600">ALL</span>'
        : entStr.split(',').map(function(e){ return '<span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:10px">'+esc(e.trim())+'</span>'; }).join(' ');
      var mcFlag = String(u.MUST_CHANGE||'').toUpperCase() === 'TRUE'
        ? '<span title="Must change password" style="color:var(--gold);font-size:11px"> &#9888;</span>' : '';
      return '<tr>'+
        '<td style="font-family:monospace;font-size:11px">'+esc(u.EMAIL)+(isMe ? ' <span style="background:rgba(0,122,138,.15);color:var(--teal);font-size:9px;border-radius:3px;padding:1px 5px;font-family:inherit">YOU</span>' : '')+'</td>'+
        '<td style="font-weight:600">'+esc(u.DISPLAY_NAME||'—')+'</td>'+
        '<td><span style="background:'+meta.bg+';color:'+meta.color+';border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600">'+meta.label+'</span></td>'+
        '<td>'+entChips+'</td>'+
        '<td style="text-align:center">'+(u.HAS_PASSWORD === true || u.HAS_PASSWORD === 'true' ? '<span style="color:var(--green);font-size:12px">&#9679;</span>' : '<span style="color:var(--red);font-size:11px">Not set</span>')+mcFlag+'</td>'+
        '<td>'+
          (isActive
            ? '<span style="background:rgba(19,110,66,.1);color:var(--green);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600">Active</span>'
            : '<span style="background:rgba(200,48,48,.1);color:var(--red);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600">Inactive</span>'
          )+
        '</td>'+
        '<td style="white-space:nowrap">'+
          '<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px" onclick="UserMgmtAgent.openEdit(\''+esc(u.EMAIL)+'\')">&#9998; Edit</button> '+
          '<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px;color:var(--gold)" onclick="UserMgmtAgent.resetPassword(\''+esc(u.EMAIL)+'\')">&#128273; Reset</button> '+
          (!isMe ? '<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px;color:'+(isActive?'var(--red)':'var(--green)')+'" onclick="UserMgmtAgent.toggleActive(\''+esc(u.EMAIL)+'\','+(isActive?'false':'true')+')">'+
            (isActive ? '&#9940; Deactivate' : '&#9989; Activate')+'</button>' : '') +
        '</td>'+
      '</tr>';
    }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:28px">No users found.</td></tr>';
    var tbody = document.getElementById('users-tbody');
    if (tbody) tbody.innerHTML = html;
    var cnt = document.getElementById('users-cnt');
    if (cnt) cnt.textContent = rows.length + ' user' + (rows.length !== 1 ? 's' : '');
  },

  openAdd: function() {
    document.getElementById('um-m-mode').value = 'add';
    document.getElementById('um-m-orig-email').value = '';
    document.getElementById('um-modal-title').textContent = 'Add User';
    document.getElementById('um-m-email').value = '';
    document.getElementById('um-m-email').disabled = false;
    document.getElementById('um-m-name').value = '';
    document.getElementById('um-m-role').value = 'HR_OFFICER';
    document.getElementById('um-m-active').value = 'TRUE';
    document.getElementById('um-m-password').value = '';
    document.getElementById('um-m-pwd-row').style.display = 'block';
    document.getElementById('um-m-pwd-label').innerHTML = 'Password <span class="req">*</span>';
    ['ALL','UG','UST','USG','USGM'].forEach(function(id){ var el=document.getElementById('um-ent-'+id); if(el) el.checked = id==='ALL'; });

    s('um-modal', 'display:block');

  openEdit: function(email) {
    var u = this._data.find(function(x){ return String(x.EMAIL||'').toLowerCase() === String(email||'').toLowerCase(); });
    if (!u) return;
    document.getElementById('um-m-mode').value = 'edit';
    document.getElementById('um-m-orig-email').value = u.EMAIL;
    document.getElementById('um-modal-title').textContent = 'Edit User';
    document.getElementById('um-m-email').value = u.EMAIL;
    document.getElementById('um-m-email').disabled = true; // email is the key, can't change
    document.getElementById('um-m-name').value = u.DISPLAY_NAME || '';
    document.getElementById('um-m-role').value = u.ROLE || 'STAFF';
    document.getElementById('um-m-active').value = String(u.ACTIVE||'TRUE').toUpperCase() === 'FALSE' ? 'FALSE' : 'TRUE';
    // Show password field as optional on edit
    document.getElementById('um-m-pwd-row').style.display = 'block';
    document.getElementById('um-m-pwd-label').innerHTML = 'New Password <span style="color:var(--muted);font-weight:400">(leave blank to keep current)</span>';
    document.getElementById('um-m-password').value = '';
    // Entities
    var entStr = String(u.ENTITIES||'ALL').trim();
    var isAll = entStr.toUpperCase() === 'ALL';
    ['UG','UST','USG','USGM'].forEach(function(id){
      var val = id === 'USGM' ? 'USG-M' : id;
      var el = document.getElementById('um-ent-'+id); if(!el) return;
      el.checked = isAll || entStr.split(',').map(function(e){return e.trim().toUpperCase();}).indexOf(val) >= 0;
      el.disabled = isAll;
    });
    var allEl = document.getElementById('um-ent-ALL'); if(allEl) { allEl.checked = isAll; }
    s('um-modal-backdrop','display:block');
    s('um-modal','display:block');
  },

  onEntAll: function(checkbox) {
    var checked = checkbox.checked;
    ['UG','UST','USG','USGM'].forEach(function(id){
      var el = document.getElementById('um-ent-'+id); if(!el) return;
      el.checked = checked;
      el.disabled = checked;
    });
  },

  save: function() {
    var mode  = document.getElementById('um-m-mode').value;
    var email = String(document.getElementById('um-m-email').value||'').trim().toLowerCase();
    var name  = String(document.getElementById('um-m-name').value||'').trim();
    var role  = document.getElementById('um-m-role').value;
    var active= document.getElementById('um-m-active').value;
    var pwd   = document.getElementById('um-m-password').value;
    if (!email) { toast('Email is required','error'); return; }
    if (!name)  { toast('Display name is required','error'); return; }
    if (mode === 'add' && !pwd) { toast('Password is required for new users','error'); return; }
    if (pwd && pwd.length < 6) { toast('Password must be at least 6 characters','error'); return; }
    // Entities
    var allEl = document.getElementById('um-ent-ALL');
    var entities;
    if (allEl && allEl.checked) {
      entities = 'ALL';
    } else {
      var picked = [];
      [{id:'UG',val:'UG'},{id:'UST',val:'UST'},{id:'USG',val:'USG'},{id:'USGM',val:'USG-M'}].forEach(function(e){
        var el = document.getElementById('um-ent-'+e.id); if(el && el.checked) picked.push(e.val);
      });
      entities = picked.length ? picked.join(',') : 'ALL';
    }
    var data = {EMAIL:email, DISPLAY_NAME:name, ROLE:role, ENTITIES:entities, ACTIVE:active};
    if (pwd) data.PASSWORD = pwd;
    var self = this;
    call('saveUser', [data], function(r){
      if (!r||!r.success) { toast(r&&r.error||'Save failed','error'); return; }
      toast('User saved','success');
      self.closeModal();
      self.load();
    });
  },

  toggleActive: function(email, active) {
    var self = this;
    var label = active ? 'activate' : 'deactivate';
    if (!confirm('Are you sure you want to ' + label + ' ' + email + '?')) return;
    call('toggleUserActive', [email, active], function(r){
      if (!r||!r.success) { toast(r&&r.error||'Failed','error'); return; }
      toast('User ' + (active?'activated':'deactivated'), 'success');
      self.load();
    });
  },

  resetPassword: function(email) {
    var self = this;
    if (!confirm('Reset password for ' + email + '?\n\nA temporary password will be generated and shown to you once.')) return;
    call('resetUserPassword', [email], function(r){
      if (!r||!r.success) { toast(r&&r.error||'Reset failed','error'); return; }
      self._tempPwd = r.tempPassword || '';
      document.getElementById('um-temp-pwd-display').textContent = self._tempPwd;
      s('um-pwd-backdrop','display:block');
      s('um-pwd-modal','display:block');
      self.load();
    });
  },

  copyTempPwd: function() {
    if (!this._tempPwd) return;
    try { navigator.clipboard.writeText(this._tempPwd).then(function(){ toast('Copied!','success'); }); }
    catch(e) { toast(this._tempPwd, 'info'); }
  },

  closePwdModal: function() {
    this._tempPwd = '';
    s('um-pwd-backdrop','display:none');
    s('um-pwd-modal','display:none');
  },

  closeModal: function() {
    s('um-modal-backdrop','display:none');
    s('um-modal','display:none');
  },
