// DS AGENT — 20 Days Strategy Tracker Module
// ============================================================
var DSAgent = {
  _tab: 'summary',
  _kpiFilter: null,          // null | 'active' | 'nsi' | 'overstage'
  _dsPage: 1,                // current page — Tracker tab
  _dsSummaryPage: 1,         // current page — Summary tab tracker
  _dsPageSize: 20,           // rows per page
  _summaryFilterInit: false, // set once on first render to default to Active
  _analyticsRaw: null,       // cached server response for analytics
  _analyticsRange: 'all',    // 'all' | '90' | '30'
  _analyticsSearch: '',      // search term for individual records table

  // Step definitions — rebuilt dynamically from APP.stepConfig after load
  // Hardcoded values serve as fallback if sheet hasn't been seeded yet
  STEPS: {
    STEP_VISA:      { label: 'Visa/Entry Issued',        short: 'VI', sla: 24,  statuses: ['Pending','Done','Problem'],     substeps: { mol_done: 'MOL Done', entry_permit: 'Entry Permit Submitted' } },
    STEP_LABOR:     { label: 'Tawjeeh & Labor Card',     short: 'LC', sla: 24,  statuses: ['Pending','Done'],               substeps: { tawjeeh: 'Tawjeeh Completed', labor_card: 'Labor Card Received' } },
    STEP_MEDICAL:   { label: 'Visa Medical',             short: 'MD', sla: 24,  statuses: ['Pending','Fit','Unfit'],        substeps: { medical_done: 'Medical Done' } },
    STEP_INSURANCE: { label: 'Medical Insurance',        short: 'MI', sla: 72,  statuses: ['Pending','Done','Problem'],     substeps: { app_submitted: 'Application Submitted', card_received: 'Card Received' } },
    STEP_NSI:       { label: 'NSI Training',             short: 'NS', sla: 168, statuses: ['Not Started','Pending','Scheduled','Done'], substeps: { app_submitted: 'Application Submitted', date_scheduled: 'Training Date Scheduled', training_completed: 'Training Completed', cert_received: 'Certificate Received' } },
    STEP_EID:       { label: 'EID & Residency Stamping', short: 'EI', sla: 48,  statuses: ['Pending','Done','Problem'],     substeps: { eid_app_submitted: 'EID Application Submitted', biometrics: 'Biometrics / Stamping Done', card_received: 'Card Received' } },
    STEP_ASSD:      { label: 'ASSD',                     short: 'AS', sla: 48,  statuses: ['Locked','Pending','Done','Problem'], substeps: {}, requiresStep: 'STEP_EID' }
  },

  // Called after loadAllData — rebuilds STEPS from the dynamic config sheet
  applyStepConfig: function(configArr) {
    if (!configArr || !configArr.length) return;
    var self = this;
    var built = {};
    configArr.forEach(function(s) {
      // Preserve requiresStep from hardcoded STEPS — it's not stored in the sheet config
      var existingRequires = (self.STEPS[s.key] && self.STEPS[s.key].requiresStep) || null;
      built[s.key] = {
        label:        s.label,
        short:        s.short,
        sla:          s.slaHours,
        statuses:     s.statuses,
        substeps:     s.substeps || {},
        requiresStep: s.requiresStep || existingRequires
      };
    });
    this.STEPS = built;
  },

  _waitingForASSDRecords: function() {
    return this._activeRecords().filter(function(r){
      if (r.OB_COMPLETE === 'TRUE') return false;
      var eid  = r.STEP_EID  || {};
      var assd = r.STEP_ASSD || {};
      return (eid.status === 'Done' || eid.status === 'Fit') &&
             assd.status !== 'Done';
    });
  },

  _waitingForEIDRecords: function() {
    return this._activeRecords().filter(function(r){
      if (r.OB_COMPLETE === 'TRUE') return false;
      var eid = r.STEP_EID || {};
      return eid.status !== 'Done' && eid.status !== 'Fit';
    });
  },

  _completedRecords: function() {
    return this._activeRecords().filter(function(r){ return r.OB_COMPLETE === 'TRUE'; });
  },

  _statusClass: function(status) {
    var map = { 'Done':'done','Pending':'pending','Problem':'problem',
                'Not Started':'notstart','Fit':'fit','Unfit':'unfit','Started':'pending','Locked':'locked' };
    return map[status] || 'pending';
  },

  _daysFromDate: function(dateStr) {
    if (!dateStr) return 0;
    var d;
    var m = String(dateStr).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (m) d = new Date(Number(m[3]), Number(m[2])-1, Number(m[1]));
    else d = new Date(dateStr);
    if (isNaN(d)) return 0;
    return Math.floor((Date.now() - d) / 86400000);
  },

  _activeRecords: function() {
    return (APP.dsTracker || []).filter(function(r){ return r.CANCELLED !== 'TRUE'; });
  },

  _nsiRecords: function() {
    var today = new Date(); today.setHours(0,0,0,0);
    return this._activeRecords().filter(function(r){
      if (r.OB_COMPLETE === 'TRUE') return false;
      var nsi = r.STEP_NSI || {};
      // Must be actively scheduled
      if ((nsi.status || 'Not Started') !== 'Scheduled') return false;
      // If complete_date is set and already passed, training has ended — exclude
      var cdStr = nsi.complete_date || '';
      if (cdStr) {
        var cd = new Date(cdStr);
        if (!isNaN(cd) && cd < today) return false;
      }
      return true;
    });
  },

  _overStageRecords: function() {
    return this._activeRecords().filter(function(r){
      return r.OB_COMPLETE !== 'TRUE' && parseInt(r.TOTAL_DAYS_ELAPSED||0,10) > 20;
    });
  },

  _avgCompletionDays: function() {
    var n = this._avgCompletionDaysNum();
    return n !== null ? n + 'd' : '—';
  },

  _avgCompletionDaysNum: function() {
    var completed = this._activeRecords().filter(function(r){ return r.OB_COMPLETE === 'TRUE'; });
    if (!completed.length) return null;
    var total = 0, count = 0;
    completed.forEach(function(r){
      var d = parseInt(r.TOTAL_DAYS_ELAPSED||0, 10);
      if (d > 0) { total += d; count++; }
    });
    return count ? Math.round(total/count) : null;
  },

  // Returns the latest step complete_date as ms timestamp for a record
  _completionMs: function(rec) {
    var maxMs = 0;
    Object.keys(this.STEPS).forEach(function(k){
      var cd = rec[k] && rec[k].complete_date;
      if (cd) { var t = new Date(cd).getTime(); if (!isNaN(t) && t > maxMs) maxMs = t; }
    });
    return maxMs;
  },

  // Compute what each KPI value was ~7 days ago using current data
  _computeLastWeekKPIs: function() {
    var self = this;
    var cutMs = Date.now() - 7 * 86400000;
    var active = 0, nsi = 0, overstage = 0;
    var completedDays = [], completedCount = 0, completedTotal = 0;

    (APP.dsTracker || []).forEach(function(r) {
      if (r.CANCELLED === 'TRUE') return;
      var days = parseInt(r.TOTAL_DAYS_ELAPSED || 0, 10);
      if (days < 7) return; // not yet transferred last week
      var daysLW = days - 7;

      // Was this record already complete last week?
      var compMs = r.OB_COMPLETE === 'TRUE' ? self._completionMs(r) : 0;
      var wasCompleteLW = compMs > 0 && compMs <= cutMs;

      if (wasCompleteLW) {
        // Compute days-to-complete at that time
        var tRaw = r.TRANSFER_DATE || '';
        var tm = tRaw.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
        var tMs = tm ? new Date(+tm[3],+tm[2]-1,+tm[1]).getTime() : new Date(tRaw).getTime();
        if (!isNaN(tMs) && compMs > tMs) {
          completedTotal += Math.round((compMs - tMs) / 86400000);
          completedCount++;
        }
        return; // completed before last week — skip active/nsi/overstage
      }

      // Still in progress last week — count ALL as active; overstage if >20d
      active++;
      if (daysLW > 20) overstage++;

      // NSI last week: Scheduled AND complete_date was not yet passed as of last week
      var nd = r.STEP_NSI || {};
      var nsiStatus = nd.status || 'Not Started';
      var nsiCompMs = nd.complete_date ? new Date(nd.complete_date).getTime() : 0;
      if (nsiStatus === 'Scheduled' && (nsiCompMs === 0 || nsiCompMs > cutMs)) nsi++;
    });

    // Last-week counts for the 3 new cards — simpler pass
    var waitAssd = 0, waitEid = 0, completed = 0;
    (APP.dsTracker || []).forEach(function(r) {
      if (r.CANCELLED === 'TRUE') return;
      var days = parseInt(r.TOTAL_DAYS_ELAPSED || 0, 10);
      if (days < 7) return;
      var compMs = r.OB_COMPLETE === 'TRUE' ? self._completionMs(r) : 0;
      var wasCompleteLW = compMs > 0 && compMs <= cutMs;
      if (wasCompleteLW) { completed++; return; }
      // In progress last week
      var eid  = r.STEP_EID  || {};
      var assd = r.STEP_ASSD || {};
      var eidDone = eid.status === 'Done' || eid.status === 'Fit';
      if (!eidDone) waitEid++;
      else if (assd.status !== 'Done') waitAssd++;
    });

    return {
      active:    active,
      nsi:       nsi,
      overstage: overstage,
      avgDays:   completedCount > 0 ? Math.round(completedTotal / completedCount) : null,
      waitAssd:  waitAssd,
      waitEid:   waitEid,
      completed: completed
    };
  },

  // ── Pagination helper ──
  // pgEl      : DOM element to render into
  // total     : total filtered records
  // pageSize  : rows per page
  // page      : current page (1-based)
  // goCb      : string name of the DSAgent method to call, e.g. 'goTrackerPage'
  _renderPagination: function(pgEl, total, pageSize, page, goCb) {
    if (!pgEl) return;
    var totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
    var start = Math.max(1, page - 2);
    var end   = Math.min(totalPages, start + 4);
    start = Math.max(1, end - 4);
    var h = '<div class="ds-pgn">';
    h += '<button class="ds-pgbtn"'+(page<=1?' disabled':'')+' onclick="DSAgent.'+goCb+'('+(page-1)+')">&#8249;</button>';
    if (start > 1) h += '<span class="ds-pgi">\u2026</span>';
    for (var p = start; p <= end; p++) {
      h += '<button class="ds-pgbtn'+(p===page?' active':'')+'" onclick="DSAgent.'+goCb+'('+p+')">'+p+'</button>';
    }
    if (end < totalPages) h += '<span class="ds-pgi">\u2026</span>';
    h += '<button class="ds-pgbtn"'+(page>=totalPages?' disabled':'')+' onclick="DSAgent.'+goCb+'('+(page+1)+')">&#8250;</button>';
    h += '<span class="ds-pgi">'+total+' records &nbsp;&middot;&nbsp; pg '+page+'/'+totalPages+'</span>';
    h += '</div>';
    pgEl.innerHTML = h;
  },

  goTrackerPage: function(p) { this._dsPage = p; this.renderTracker(); },
  goSummaryTrackerPage: function(p) { this._dsSummaryPage = p; this.renderSummaryTracker(); },

  renderBadge: function() {
    var overStage = this._overStageRecords();
    var nb = document.getElementById('nb-ds');
    if (nb) {
      nb.textContent = overStage.length;
      // Red alert when over-stage records exist, cyan when just tracking
      nb.className = overStage.length > 0 ? 'sb-badge red' : 'sb-badge';
      nb.style.background = overStage.length > 0 ? '' : 'rgba(0,229,255,.2)';
      nb.style.color = overStage.length > 0 ? '' : '#00e5ff';
    }
  },

  switchTab: function(tab) {
    this._tab = tab;
    document.querySelectorAll('.ds-tab').forEach(function(t){
      t.classList.toggle('active', t.dataset.dstab === tab);
    });
    ['summary','tracker','pending','delayed','cancelled','audit','analytics'].forEach(function(t){
      var el = document.getElementById('ds-tab-' + t);
      if (el) el.style.display = (t === tab) ? 'block' : 'none';
    });
    if (tab === 'summary')   { this.renderSummary(); this.renderSummaryTracker(); }
    if (tab === 'tracker')   this.renderTracker();
    if (tab === 'pending')   this.renderPending();
    if (tab === 'delayed')   this.renderDelayed();
    if (tab === 'cancelled') this.renderCancelled();
    if (tab === 'analytics') this.renderAnalytics();
  },

  render: function() {
    // Default the Summary tracker status filter to "Active" on the very first render
    if (!this._summaryFilterInit) {
      var sf = document.getElementById('ds-summary-status');
      if (sf && !sf.value) sf.value = 'active';
      this._summaryFilterInit = true;
    }
    this.renderBadge();
    this.switchTab(this._tab || 'summary');
  },

  refresh: function() {
    var self = this;
    this._clearAnalyticsCache(); // force re-fetch on next analytics open
    GAS.get20DSTracker(function(r){
      if (r && r.success) { APP.dsTracker = r.data || []; self.render(); toast('20DS data refreshed','info'); }
      else toast('Error refreshing 20DS data: '+(r?r.error:''),'error');
    });
  },

  recalculateTotals: function() {
    var self = this;
    toast('Recalculating day totals…', 'info');
    GAS.recalculate20DSTotals(function(r){
      if (!r || !r.success) { toast('Recalculate failed: '+(r?r.error:'Unknown'), 'error'); return; }
      // Reload fresh data from server so TOTAL_DAYS_ELAPSED reflects recalculated values
      GAS.get20DSTracker(function(r2){
        if (r2 && r2.success) { APP.dsTracker = r2.data || []; self.render(); }
        toast('Recalculated ' + r.updated + ' records', 'success');
      });
    });
  },

  // ── KPI Card Click Filter ──
  filterByKPI: function(type) {
    if (type === 'analytics') { this.switchTab('analytics'); return; }
    this._kpiFilter = (this._kpiFilter === type) ? null : type;
    document.querySelectorAll('.ds-kpi-clickable').forEach(function(el){
      el.classList.toggle('kpi-active', el.dataset.kpi === DSAgent._kpiFilter);
    });
    this.switchTab('tracker');
  },

  // ── Summary Tab ──
  renderSummary: function() {
    var self = this;
    var now = new Date(); var curMonth = now.getMonth(); var curYear = now.getFullYear();
    var active    = this._activeRecords();
    var cancelled = (APP.dsTracker||[]).filter(function(r){ return r.CANCELLED==='TRUE'; });
    var delayed   = this._overStageRecords();
    var inprog    = active.filter(function(r){ return r.OB_COMPLETE!=='TRUE'; });
    var nsiNow    = this._nsiRecords();
    var waitAssd  = this._waitingForASSDRecords();
    var waitEid   = this._waitingForEIDRecords();
    // "Completed with ASSD" counts only the current month
    var complete  = this._completedRecords().filter(function(r){
      var ms = self._completionMs(r);
      if (!ms) return false;
      var d = new Date(ms);
      return d.getMonth() === curMonth && d.getFullYear() === curYear;
    });

    var set = function(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; };
    // KPI cards
    set('ds-kpi-active20ds',  inprog.length);
    set('ds-kpi-nsi',         nsiNow.length);
    set('ds-kpi-overstage',   delayed.length);
    set('ds-kpi-avgspeed',    this._avgCompletionDays());
    set('ds-kpi-waitassd',    waitAssd.length);
    set('ds-kpi-waiteid',     waitEid.length);
    var compEl = document.getElementById('ds-kpi-completed');
    if (compEl) compEl.textContent = complete.length + ' / ' + active.length;
    // Update the KPI label to clarify "this month"
    var compLblEl = compEl && compEl.closest('.ds-kpi') && compEl.closest('.ds-kpi').querySelector('.ds-kpi-lbl');
    if (compLblEl) compLblEl.textContent = 'Completed with ASSD (This Month)';

    // ── Week-over-week trend badges ──
    var lw = this._computeLastWeekKPIs();
    var avgNow = this._avgCompletionDaysNum();
    var trendEl = function(id, current, prev, higherIsBad) {
      var el = document.getElementById(id);
      if (!el) return;
      if (prev === null || prev === undefined) {
        el.className = 'ds-kpi-trend neutral';
        el.textContent = 'No prev data';
        return;
      }
      if (prev === 0 && current === 0) {
        el.className = 'ds-kpi-trend neutral';
        el.textContent = '= Same as last wk';
        return;
      }
      if (prev === 0) {
        el.className = 'ds-kpi-trend up-good';
        el.textContent = '\u2191 New this week';
        return;
      }
      var diff = current - prev;
      var pct  = Math.round(Math.abs(diff) / prev * 100);
      if (diff === 0) {
        el.className = 'ds-kpi-trend neutral';
        el.textContent = '= Same as last wk';
        return;
      }
      var goingUp = diff > 0;
      var isGood  = goingUp ? !higherIsBad : higherIsBad;
      el.className = 'ds-kpi-trend ' + (goingUp ? (isGood ? 'up-good' : 'up-bad') : (isGood ? 'down-good' : 'down-bad'));
      el.textContent = (goingUp ? '\u2191' : '\u2193') + ' ' + pct + '% vs last wk';
    };
    trendEl('ds-kpi-trend-active',    inprog.length,   lw.active,    false);
    trendEl('ds-kpi-trend-nsi',       nsiNow.length,   lw.nsi,       false);
    trendEl('ds-kpi-trend-overstage', delayed.length,  lw.overstage, true);
    trendEl('ds-kpi-trend-avgspeed',  avgNow,          lw.avgDays,   true);
    trendEl('ds-kpi-trend-waitassd',  waitAssd.length, lw.waitAssd,  true);
    trendEl('ds-kpi-trend-waiteid',   waitEid.length,  lw.waitEid,   true);
    trendEl('ds-kpi-trend-completed', complete.length, lw.completed, false);

    // legacy ids (kept for backward compat)
    set('ds-kpi-total',       active.length);
    set('ds-kpi-complete',    complete.length);
    set('ds-kpi-inprogress',  inprog.length);
    set('ds-kpi-delayed',     delayed.length);
    set('ds-kpi-cancelled',   cancelled.length);

    var stepKeys = Object.keys(this.STEPS);
    var self = this;
    var tbody = document.getElementById('ds-summary-tbody');
    if (!tbody) return;
    if (!active.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="ds-empty"><div class="ds-empty-icon">&#9698;</div>No active records.</div></td></tr>';
      return;
    }
    tbody.innerHTML = stepKeys.map(function(k){
      var label = self.STEPS[k].label;
      var done=0, pending=0, problem=0, notStart=0;
      active.forEach(function(r){
        var s = (r[k] && r[k].status) || 'Pending';
        if (s==='Done'||s==='Fit') done++;
        else if (s==='Problem'||s==='Unfit') problem++;
        else if (s==='Not Started') notStart++;
        else pending++;
      });
      var total = active.length;
      var pct = total ? Math.round((done/total)*100) : 0;
      return '<tr><td style="color:var(--ds-text);font-weight:600">'+esc(label)+'</td>'+
             '<td><span class="ds-badge done">'+done+'</span></td>'+
             '<td><span class="ds-badge pending">'+pending+'</span></td>'+
             '<td><span class="ds-badge problem">'+(problem+notStart)+'</span></td>'+
             '<td><span class="ds-badge notstart">'+notStart+'</span></td>'+
             '<td style="min-width:120px"><div class="ds-progress-bar"><div class="ds-progress-fill" style="width:'+pct+'%"></div></div><span style="font-size:10px;color:var(--ds-muted);font-family:var(--ds-mono)">'+pct+'%</span></td></tr>';
    }).join('');

    // ── Unified Onboarding Intelligence ──
    this.renderUOI();
  },

  // ── Unified Onboarding Intelligence ──
  renderUOI: function() {
    var all  = this._activeRecords();
    var now  = new Date();
    var msDay = 86400000;

    // Parse a date string (yyyy-MM-dd or dd/MM/yyyy) → Date
    var parseDate = function(d) {
      if (!d) return null;
      var s = String(d).trim().substring(0, 10);
      var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) return new Date(+m[1], +m[2]-1, +m[3]);
      m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) return new Date(+m[3], +m[2]-1, +m[1]);
      return null;
    };

    // Time-bound slices by TRANSFER_DATE
    var cut20 = new Date(now.getTime() - 20 * msDay);
    var cut40 = new Date(now.getTime() - 40 * msDay);
    var recs20 = all.filter(function(r){ var d=parseDate(r.TRANSFER_DATE); return d && d>=cut20; });
    var recs40 = all.filter(function(r){ var d=parseDate(r.TRANSFER_DATE); return d && d>=cut40; });

    // Compute avg completion days + rate for a set
    var computeStats = function(recs) {
      var completedRecs = recs.filter(function(r){ return r.OB_COMPLETE==='TRUE'; });
      var avgDays = null;
      if (completedRecs.length) {
        var sum = completedRecs.reduce(function(a,r){ return a+parseInt(r.TOTAL_DAYS_ELAPSED||0,10); }, 0);
        avgDays = Math.round(sum / completedRecs.length * 10) / 10;
      }
      var rate = recs.length ? Math.round((completedRecs.length/recs.length)*100) : null;
      return { avgDays:avgDays, rate:rate, total:recs.length, completed:completedRecs.length };
    };

    // HR stats for a set, sorted by rate desc then avgDays asc
    var computeHRStats = function(recs) {
      var hrMap = {};
      recs.forEach(function(r){
        var hr = r.RESPONSIBLE_HR || 'Unassigned';
        if (!hrMap[hr]) hrMap[hr] = {total:0, completed:0, totalDays:0};
        hrMap[hr].total++;
        if (r.OB_COMPLETE==='TRUE'){ hrMap[hr].completed++; hrMap[hr].totalDays+=parseInt(r.TOTAL_DAYS_ELAPSED||0,10); }
      });
      return Object.keys(hrMap).map(function(name){
        var h = hrMap[name];
        var avgD = h.completed>0 ? Math.round(h.totalDays/h.completed*10)/10 : null;
        return {name:name, avgDays:avgD, rate: h.total?Math.round((h.completed/h.total)*100):0, completed:h.completed, total:h.total};
      }).sort(function(a,b){
        if (b.rate!==a.rate) return b.rate-a.rate;
        if (a.avgDays!==null && b.avgDays!==null) return a.avgDays-b.avgDays;
        return a.avgDays===null ? 1 : -1;
      });
    };

    var tbody = document.getElementById('ds-uoi-tbody');
    if (!tbody) return;

    var rows = [];

    // ── Row 1: Individual employee search ──
    var q = ((document.getElementById('ds-uoi-search')||{}).value||'').toLowerCase().trim();
    var empRec = null;
    if (q) {
      empRec = all.find(function(r){
        return (r.EMP_ID||'').toLowerCase().indexOf(q)>=0 ||
               (r.EMP_NAME||'').toLowerCase().indexOf(q)>=0;
      });
    }

    if (q && !empRec) {
      rows.push('<tr><td colspan="6"><div class="ds-empty" style="padding:10px 14px">No record found for "<strong>'+esc(q)+'</strong>"</div></td></tr>');
    } else if (empRec) {
      var empDays   = empRec.OB_COMPLETE==='TRUE' ? parseInt(empRec.TOTAL_DAYS_ELAPSED||0,10) : null;
      var empDaysOk = empDays !== null && empDays <= 20;
      var empStatus = empRec.OB_COMPLETE==='TRUE' ? 'Complete'
                    : parseInt(empRec.TOTAL_DAYS_ELAPSED||0,10)>20 ? 'Over Stage' : 'In Progress';
      var empStatusColor = empRec.OB_COMPLETE==='TRUE' ? 'var(--ds-green)'
                         : parseInt(empRec.TOTAL_DAYS_ELAPSED||0,10)>20 ? 'var(--ds-red)' : 'var(--ds-cyan)';
      var allHRStats  = computeHRStats(all);
      var empHRName   = empRec.RESPONSIBLE_HR || '—';
      var empHRStat   = allHRStats.find(function(h){ return h.name===(empRec.RESPONSIBLE_HR||'Unassigned'); });
      var empHRVel    = empHRStat && empHRStat.avgDays!==null ? empHRStat.avgDays+'d avg' : '—';
      var empDaysColor = empDays===null ? 'var(--ds-muted)' : empDaysOk ? 'var(--ds-green)' : 'var(--ds-red)';
      rows.push(
        '<tr style="background:rgba(0,122,138,.04)">'+
        '<td style="border-left:3px solid var(--ds-cyan)">'+
          '<div style="font-weight:700;color:var(--ds-text)">'+esc(empRec.EMP_NAME||'—')+'</div>'+
          '<div style="font-size:10px;color:var(--ds-muted);font-family:var(--ds-mono)">'+esc(empRec.EMP_ID||'—')+' &middot; '+esc(empRec.DESIGNATION||'—')+'</div>'+
        '</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono);font-weight:600">1</td>'+
        '<td style="text-align:center">'+
          '<span style="font-family:var(--ds-mono);font-size:13px;font-weight:700;color:'+empDaysColor+'">'+(empDays!==null?empDays+'d':'—')+'</span>'+
          (empDays!==null?'<div style="font-size:9px;color:var(--ds-muted)">'+(empDaysOk?'Within 20d':'Exceeded 20d')+'</div>':'')+
        '</td>'+
        '<td style="text-align:center"><span class="ds-badge" style="background:'+empStatusColor+'22;color:'+empStatusColor+';border:1px solid '+empStatusColor+'44">'+empStatus+'</span></td>'+
        '<td style="font-weight:600">'+esc(empHRName)+'</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono);color:var(--ds-cyan);font-weight:700">'+empHRVel+'</td>'+
        '</tr>'
      );
    } else {
      rows.push('<tr><td colspan="6" style="padding:12px 16px;font-style:italic;font-size:11px;color:var(--ds-muted)">&#128269; Search an employee name or ID above to view their individual record.</td></tr>');
    }

    // ── Rows 2 & 3: Time-bound global averages ──
    var buildAvgRow = function(label, icon, recs, accentColor) {
      if (!recs.length) {
        return '<tr><td style="border-left:3px solid '+accentColor+'"><span style="color:'+accentColor+'">'+icon+'</span> <strong>'+label+'</strong></td>'+
               '<td colspan="5" style="color:var(--ds-muted);font-size:11px;font-style:italic">No records transferred in this period.</td></tr>';
      }
      var stats  = computeStats(recs);
      var hrTop  = computeHRStats(recs)[0];
      var avgColor = stats.avgDays===null ? 'var(--ds-muted)' : stats.avgDays<=20 ? 'var(--ds-green)' : 'var(--ds-red)';
      var rateColor = stats.rate===null ? 'var(--ds-muted)' : stats.rate>=80 ? 'var(--ds-green)' : stats.rate>=50 ? 'var(--ds-amber)' : 'var(--ds-red)';
      return '<tr>'+
        '<td style="border-left:3px solid '+accentColor+'">'+
          '<div style="font-weight:700;color:var(--ds-text)"><span style="color:'+accentColor+'">'+icon+'</span> '+label+'</div>'+
          '<div style="font-size:9px;color:var(--ds-muted);font-family:var(--ds-mono)">'+stats.completed+' completed / '+stats.total+' records</div>'+
        '</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono);font-weight:600">'+stats.total+'</td>'+
        '<td style="text-align:center">'+
          '<span style="font-family:var(--ds-mono);font-size:13px;font-weight:700;color:'+avgColor+'">'+(stats.avgDays!==null?stats.avgDays+'d':'—')+'</span>'+
          (stats.avgDays!==null?'<div style="font-size:9px;color:var(--ds-muted)">'+(stats.avgDays<=20?'Within 20d':'Exceeded 20d')+'</div>':'')+
        '</td>'+
        '<td style="text-align:center">'+
          '<span class="ds-badge" style="background:'+rateColor+'22;color:'+rateColor+';border:1px solid '+rateColor+'44">'+(stats.rate!==null?stats.rate+'%':'—')+'</span>'+
        '</td>'+
        '<td style="font-weight:600">'+(hrTop?esc(hrTop.name):'—')+'</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono);color:var(--ds-cyan);font-weight:700">'+
          (hrTop&&hrTop.avgDays!==null?hrTop.avgDays+'d avg':'—')+
        '</td>'+
        '</tr>';
    };

    rows.push(buildAvgRow('Last 20 Days Global Avg', '&#128337;', recs20, 'var(--ds-blue)'));
    rows.push(buildAvgRow('Last 40 Days Global Avg', '&#128336;', recs40, 'var(--ds-purple)'));
    tbody.innerHTML = rows.join('');

    // ── HR breakdown sub-table ──
    this._renderHRBreakdown(all);
  },

  _renderHRBreakdown: function(recs) {
    var el = document.getElementById('ds-uoi-hr-tbody');
    if (!el) return;
    if (!recs.length) {
      el.innerHTML = '<tr><td colspan="5"><div class="ds-empty" style="padding:10px">No HR data yet.</div></td></tr>';
      return;
    }
    var hrMap = {};
    recs.forEach(function(r){
      var hr = r.RESPONSIBLE_HR || 'Unassigned';
      if (!hrMap[hr]) hrMap[hr] = {total:0, completed:0, totalDays:0};
      hrMap[hr].total++;
      if (r.OB_COMPLETE==='TRUE'){ hrMap[hr].completed++; hrMap[hr].totalDays+=parseInt(r.TOTAL_DAYS_ELAPSED||0,10); }
    });
    var leaders = Object.keys(hrMap).map(function(name){
      var h = hrMap[name];
      var avgD = h.completed>0 ? Math.round(h.totalDays/h.completed*10)/10 : null;
      return {name:name, avgDays:avgD, rate:h.total?Math.round((h.completed/h.total)*100):0, completed:h.completed, total:h.total};
    }).sort(function(a,b){
      if (b.rate!==a.rate) return b.rate-a.rate;
      if (a.avgDays!==null && b.avgDays!==null) return a.avgDays-b.avgDays;
      return a.avgDays===null ? 1 : -1;
    });
    el.innerHTML = leaders.map(function(h, idx){
      var medal     = idx===0?'&#127945;':idx===1?'&#129352;':idx===2?'&#129353;':'<span style="color:var(--ds-muted);font-size:10px">'+(idx+1)+'</span>';
      var rateColor = h.rate>=80?'var(--ds-green)':h.rate>=50?'var(--ds-amber)':'var(--ds-red)';
      var velColor  = h.avgDays===null?'var(--ds-muted)':h.avgDays<=20?'var(--ds-green)':'var(--ds-amber)';
      return '<tr>'+
        '<td style="font-weight:600">'+medal+' '+esc(h.name)+'</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono)">'+h.total+'</td>'+
        '<td style="text-align:center;font-family:var(--ds-mono)">'+h.completed+'</td>'+
        '<td style="text-align:center"><span class="ds-badge" style="background:'+rateColor+'22;color:'+rateColor+';border:1px solid '+rateColor+'44">'+h.rate+'%</span></td>'+
        '<td style="text-align:center;font-family:var(--ds-mono);font-weight:700;color:'+velColor+'">'+(h.avgDays!==null?h.avgDays+'d':'—')+'</td>'+
        '</tr>';
    }).join('');
  },

  // ── Tracker Tab ──
  renderTracker: function() {
    var q   = (document.getElementById('ds-q')            ||{}).value||'';
    var sts = (document.getElementById('ds-filter-status')||{}).value||'';
    q = q.toLowerCase();
    var self = this;
    var kf   = this._kpiFilter;
    var list = (APP.dsTracker||[]).filter(function(r){
      if (r.CANCELLED === 'TRUE') return false;
      if (kf === 'active') {
        if (r.OB_COMPLETE === 'TRUE') return false;
      } else if (kf === 'nsi') {
        if (r.OB_COMPLETE === 'TRUE') return false;
        var nsi = r.STEP_NSI || {};
        if ((nsi.status || 'Not Started') !== 'Scheduled') return false;
        var nsiCd = nsi.complete_date || '';
        if (nsiCd) { var nsiD = new Date(nsiCd); var todayNsi = new Date(); todayNsi.setHours(0,0,0,0); if (!isNaN(nsiD) && nsiD < todayNsi) return false; }
      } else if (kf === 'overstage') {
        if (r.OB_COMPLETE === 'TRUE') return false;
        if (parseInt(r.TOTAL_DAYS_ELAPSED||0,10) <= 20) return false;
      } else if (kf === 'waitassd') {
        if (r.OB_COMPLETE === 'TRUE') return false;
        var eidW = r.STEP_EID || {};
        if (eidW.status !== 'Done' && eidW.status !== 'Fit') return false;
        if ((r.STEP_ASSD || {}).status === 'Done') return false;
      } else if (kf === 'waiteid') {
        if (r.OB_COMPLETE === 'TRUE') return false;
        var eidE = r.STEP_EID || {};
        if (eidE.status === 'Done' || eidE.status === 'Fit') return false;
      } else if (kf === 'completed') {
        if (r.OB_COMPLETE !== 'TRUE') return false;
      }
      if (sts === 'complete' && r.OB_COMPLETE !== 'TRUE') return false;
      if (sts === 'active'   && r.OB_COMPLETE === 'TRUE') return false;
      if (q && ![ r.EMP_ID||'', r.EMP_NAME||'', r.DESIGNATION||'' ].some(function(v){ return v.toLowerCase().indexOf(q)>=0; })) return false;
      return true;
    });

    // Filter badge
    var fb = document.getElementById('ds-kpi-filter-badge');
    if (fb) {
      var lmap = { active:'Onboarding Process - Active', nsi:'NSI Currently', overstage:'Over-Stage Alerts', waitassd:'Waiting for ASSD', waiteid:'Waiting for EID / Residency', completed:'Completed with ASSD' };
      fb.textContent = kf ? ('Filter: ' + (lmap[kf]||kf) + ' ×') : '';
      fb.style.display = kf ? 'inline-block' : 'none';
      fb.onclick = function(){ DSAgent._kpiFilter=null; document.querySelectorAll('.ds-kpi-clickable').forEach(function(el){ el.classList.remove('kpi-active'); }); if(fb) fb.style.display='none'; DSAgent.renderTracker(); };
    }

    var cnt = document.getElementById('ds-tracker-cnt');
    var total = list.length;
    if (cnt) cnt.textContent = total + ' records';

    var tbody = document.getElementById('ds-tracker-tbody');
    var pgEl  = document.getElementById('ds-tracker-pgn');
    if (!tbody) return;

    if (!total) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="ds-empty"><div class="ds-empty-icon">&#128203;</div>No records found.</div></td></tr>';
      if (pgEl) pgEl.innerHTML = '';
      return;
    }

    // Pagination slice
    var ps   = this._dsPageSize;
    this._dsPage = Math.min(this._dsPage, Math.max(1, Math.ceil(total / ps)));
    var page = this._dsPage;
    var pageList = list.slice((page - 1) * ps, page * ps);

    tbody.innerHTML = self._buildTrackerRows(pageList);
    this._renderPagination(pgEl, total, ps, page, 'goTrackerPage');
  },

  // ── Shared row builder (used by Tracker tab + Summary tab tracker) ──
  _buildTrackerRows: function(list) {
    if (!list || !list.length) return '';
    var self = this;
    var stepKeys = this.STEPS ? Object.keys(this.STEPS) : [];
    return list.map(function(r){
      var days = parseInt(r.TOTAL_DAYS_ELAPSED||0,10);
      var isOver = days > 20 && r.OB_COMPLETE !== 'TRUE';
      var daysColor = r.OB_COMPLETE === 'TRUE' ? 'var(--ds-green)' : isOver ? 'var(--ds-red)' : days > 10 ? 'var(--ds-amber)' : 'var(--ds-green)';
      var daysLabel = days + ' Days';
      var rowStyle  = isOver ? 'background:rgba(200,48,48,.04);' : '';
      var STEP_SHORT = {STEP_VISA:'Visa',STEP_LABOR:'Labor',STEP_MEDICAL:'Medical',STEP_INSURANCE:'Insurance',STEP_NSI:'NSI',STEP_EID:'EID',STEP_ASSD:'ASSD'};
      var donePills = [], pendPills = [];
      stepKeys.forEach(function(k, idx){
        var step = r[k] || {status:'Pending'};
        if (typeof step !== 'object' || step === null) step = {status:'Pending'};
        // Auto-lock ASSD if its prerequisite (EID) is not yet done
        var def = self.STEPS[k];
        if (!def) return;
        if (def.requiresStep) {
          var prereq = r[def.requiresStep] || {};
          if (prereq.status !== 'Done' && prereq.status !== 'Fit') step = {status:'Locked'};
        }
        var sc = self._statusClass(step.status||'Pending');
        var isComplete = step.status==='Done' || step.status==='Fit';
        var tipText, label;
        if (isComplete) {
          tipText = def.label;
          if (step.complete_date) {
            tipText += ' — Completed: ' + step.complete_date;
            var tRaw = r.TRANSFER_DATE || '';
            var tParts = tRaw.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
            var tDate = tParts ? new Date(+tParts[3],+tParts[2]-1,+tParts[1]) : new Date(tRaw);
            var cRaw = step.complete_date;
            var cParts = cRaw.match(/^(\d{4})-(\d{2})-(\d{2})/);
            var cDate = cParts ? new Date(+cParts[1],+cParts[2]-1,+cParts[3]) : new Date(cRaw);
            if (!isNaN(tDate) && !isNaN(cDate)) {
              tipText += ' · Day ' + Math.round((cDate-tDate)/86400000);
            }
          }
          label = STEP_SHORT[k] || def.label;
          donePills.push('<span class="ds-step-pill '+sc+'" title="'+esc(tipText)+'">'+label+'</span>');
        } else {
          tipText = def.label + ': ' + (step.status||'Pending');
          label = STEP_SHORT[k] || def.label;
          pendPills.push('<span class="ds-step-pill '+sc+'" title="'+esc(tipText)+'">'+label+'</span>');
        }
      });
      var doneCell = donePills.length ? donePills.join('<span class="ds-pill-sep">|</span>') : '<span style="color:var(--ds-muted);font-size:10px">—</span>';
      var pendCell = pendPills.length ? pendPills.join('<span class="ds-pill-sep">|</span>') : '<span style="color:var(--ds-green);font-size:10px">&#10003; All done</span>';
      // Progress bar computation
      var totalSteps = stepKeys.length || 1;
      var doneSteps  = stepKeys.filter(function(k){ var s=(r[k]||{}).status; return s==='Done'||s==='Fit'; }).length;
      var pct        = Math.round(doneSteps / totalSteps * 100);
      var barBg, barClass;
      if (r.OB_COMPLETE === 'TRUE') {
        barBg    = 'linear-gradient(90deg,#232840 0%,#448aff 40%,#00e676 100%)';
        barClass = 'ds-inline-bar-fill';
      } else if (isOver) {
        barBg    = 'var(--ds-red)';
        barClass = 'ds-inline-bar-fill overstage';
      } else {
        var mid  = Math.max(20, pct * 0.5);
        barBg    = 'linear-gradient(90deg,#232840 0%,#448aff '+mid+'%,#00e676 100%)';
        barClass = 'ds-inline-bar-fill';
      }
      var barLabel = r.OB_COMPLETE === 'TRUE'
        ? 'Completed ✓'
        : (isOver ? 'Day '+days+' — Over Stage' : doneSteps+' / '+totalSteps+' steps · '+pct+'%');
      var progBar =
        '<div class="ds-inline-bar-wrap">'+
          '<div class="'+barClass+'" style="width:'+pct+'%;background:'+barBg+'"></div>'+
        '</div>'+
        '<div class="ds-inline-bar-label">'+barLabel+'</div>';
      var compBadge = r.OB_COMPLETE==='TRUE'
        ? '<span class="ds-badge complete">&#10003; Done</span>'
        : isOver
          ? '<span class="ds-badge problem">&#9888; Over-Stage</span>'
          : '<span class="ds-badge pending">In Progress</span>';
      return '<tr style="'+rowStyle+'">'+
        '<td class="mono">'+esc(r.EMP_ID||'—')+'</td>'+
        '<td style="font-weight:700">'+esc(r.EMP_NAME||'—')+'</td>'+
        '<td style="font-size:11px">'+esc(r.DESIGNATION||'—')+'</td>'+
        '<td class="mono" style="color:'+daysColor+';font-weight:700">'+daysLabel+'</td>'+
        '<td class="ds-steps-cell"><div class="ds-steps-row">'+doneCell+'</div></td>'+
        '<td class="ds-steps-cell"><div class="ds-steps-row">'+pendCell+'</div>'+progBar+'</td>'+
        '<td>'+
          '<button class="ds-btn cyan sm" onclick="DSAgent.openProgressCard(\''+esc(r.DS_ID)+'\')" title="Update">&#9998; Update</button>'+
        '</td>'+
      '</tr>';
    }).join('');
  },

  // ── Summary Tab Tracker (mirrors Tracker tab, uses its own DOM IDs) ──
  renderSummaryTracker: function() {
    var q   = (document.getElementById('ds-sq')             ||{}).value||'';
    var sts = (document.getElementById('ds-summary-status') ||{}).value||'';
    q = q.toLowerCase();
    var list = (APP.dsTracker||[]).filter(function(r){
      if (r.CANCELLED === 'TRUE') return false;
      if (sts === 'complete' && r.OB_COMPLETE !== 'TRUE') return false;
      if (sts === 'active'   && r.OB_COMPLETE === 'TRUE') return false;
      if (q && ![ r.EMP_ID||'', r.EMP_NAME||'', r.DESIGNATION||'' ].some(function(v){ return v.toLowerCase().indexOf(q)>=0; })) return false;
      return true;
    });

    var total = list.length;
    var cnt   = document.getElementById('ds-summary-tracker-cnt');
    var tbody = document.getElementById('ds-summary-tracker-tbody');
    var pgEl  = document.getElementById('ds-summary-tracker-pgn');
    if (cnt) cnt.textContent = total + ' records';
    if (!tbody) return;

    if (!total) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="ds-empty"><div class="ds-empty-icon">&#128203;</div>No records found.</div></td></tr>';
      if (pgEl) pgEl.innerHTML = '';
      return;
    }

    var ps   = this._dsPageSize;
    this._dsSummaryPage = Math.min(this._dsSummaryPage, Math.max(1, Math.ceil(total / ps)));
    var page = this._dsSummaryPage;
    var pageList = list.slice((page - 1) * ps, page * ps);

    tbody.innerHTML = this._buildTrackerRows(pageList);
    this._renderPagination(pgEl, total, ps, page, 'goSummaryTrackerPage');
  },

  // ── Pending Tab ──
  renderPending: function() {
    var self = this;
    var byEmp = {};   // dsId -> { emp, empId, responsible, totalDays, steps:[] }
    var order = [];   // dsId insertion order
    (APP.dsTracker||[]).forEach(function(r){
      if (r.CANCELLED === 'TRUE' || r.OB_COMPLETE === 'TRUE') return;
      var pending = [];
      Object.keys(self.STEPS).forEach(function(k){
        var step = r[k] || {status:'Pending'};
        var s = step.status || 'Pending';
        if (s === 'Done' || s === 'Fit') return;
        // Step-specific days: time since the step was started (or fall back to transfer date)
        var stepDateStr = step.start_date || step.start_dt || r.TRANSFER_DATE;
        var stepDays = self._daysFromDate(stepDateStr);
        pending.push({ step: self.STEPS[k].label, status: s, days: stepDays, dsId: r.DS_ID, stepKey: k });
      });
      if (!pending.length) return;
      order.push(r.DS_ID);
      byEmp[r.DS_ID] = {
        emp: r.EMP_NAME, empId: r.EMP_ID,
        responsible: r.RESPONSIBLE_HR || '—',
        totalDays: self._daysFromDate(r.TRANSFER_DATE),
        steps: pending
      };
    });
    // Sort employees by total days (most overdue first)
    order.sort(function(a,b){ return byEmp[b].totalDays - byEmp[a].totalDays; });

    var totalPending = order.reduce(function(n,k){ return n + byEmp[k].steps.length; }, 0);
    var cnt = document.getElementById('ds-pending-cnt');
    if (cnt) cnt.textContent = totalPending + ' pending steps';
    var tbody = document.getElementById('ds-pending-tbody');
    if (!tbody) return;
    if (!order.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="ds-empty"><div class="ds-empty-icon">&#10004;</div>All steps complete.</div></td></tr>';
      return;
    }

    var html = '';
    order.forEach(function(dsId){
      var emp = byEmp[dsId];
      var n   = emp.steps.length;
      emp.steps.forEach(function(row, i){
        var sc     = self._statusClass(row.status);
        var dColor = row.days > 20 ? 'var(--ds-red)' : row.days > 10 ? 'var(--ds-amber)' : 'var(--ds-muted)';
        // Visual separator between employees (except the very first row)
        var trBorder = (i === 0 && html !== '') ? 'border-top:2px solid var(--ds-border);' : '';
        html += '<tr style="'+trBorder+'">';
        // Employee columns — rendered only on the first step row, spanning all step rows
        if (i === 0) {
          html += '<td rowspan="'+n+'" style="font-weight:700;border-right:1px solid var(--ds-border);vertical-align:top;padding-top:11px">'+esc(emp.emp||'—')+'</td>';
          html += '<td rowspan="'+n+'" class="mono" style="border-right:1px solid var(--ds-border);vertical-align:top;padding-top:11px;font-size:11px">'+esc(emp.empId||'—')+'</td>';
          html += '<td rowspan="'+n+'" style="font-size:11px;border-right:1px solid var(--ds-border);vertical-align:top;padding-top:11px;color:var(--ds-muted)">'+esc(emp.responsible)+'</td>';
        }
        // Step-specific columns (Progress Path, Status, Days Elapsed, Action)
        html += '<td style="font-weight:600;font-size:12px">'+esc(row.step)+'</td>';
        html += '<td><span class="ds-badge '+sc+'">'+esc(row.status)+'</span></td>';
        html += '<td class="mono" style="color:'+dColor+';font-weight:700">'+row.days+'d</td>';
        html += isReadOnly() ? '<td></td>' : '<td><button class="ds-btn cyan sm" onclick="DSAgent.openStepModal(\''+esc(row.dsId)+'\',\''+row.stepKey+'\')">Update</button></td>';
        html += '</tr>';
      });
    });
    tbody.innerHTML = html;
  },

  // ── Delayed Tab ──
  renderDelayed: function() {
    var self = this;
    var list = (APP.dsTracker||[]).filter(function(r){
      return r.CANCELLED !== 'TRUE' && r.OB_COMPLETE !== 'TRUE' && parseInt(r.TOTAL_DAYS_ELAPSED||0,10) > 20;
    });
    list.sort(function(a,b){ return parseInt(b.TOTAL_DAYS_ELAPSED||0,10) - parseInt(a.TOTAL_DAYS_ELAPSED||0,10); });
    var cnt = document.getElementById('ds-delayed-cnt');
    if (cnt) cnt.textContent = list.length + ' delayed';
    var tbody = document.getElementById('ds-delayed-tbody');
    if (!tbody) return;
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="ds-empty"><div class="ds-empty-icon">&#9989;</div>No delayed records.</div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map(function(r){
      var days = parseInt(r.TOTAL_DAYS_ELAPSED||0,10);
      var pendingSteps = Object.keys(self.STEPS).filter(function(k){
        var s = (r[k] && r[k].status) || 'Pending';
        return s !== 'Done' && s !== 'Fit';
      }).map(function(k){ return self.STEPS[k].label; }).join(', ');
      return '<tr>'+
        '<td class="mono" style="color:var(--ds-cyan)">'+esc(r.EMP_ID||'—')+'</td>'+
        '<td style="font-weight:600">'+esc(r.EMP_NAME||'—')+'</td>'+
        '<td style="font-size:11px">'+esc(r.DESIGNATION||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--ds-muted)">'+esc(r.TRANSFER_DATE||'—')+'</td>'+
        '<td class="mono" style="color:var(--ds-red);font-weight:700">'+days+'d</td>'+
        '<td style="font-size:11px">'+esc(r.RESPONSIBLE_HR||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--ds-amber)">'+esc(pendingSteps||'—')+'</td>'+
      '</tr>';
    }).join('');
  },

  // ── Progress Card Modal ──
  openProgressCard: function(dsId) {
    var rec = (APP.dsTracker||[]).find(function(r){ return r.DS_ID === dsId; });
    if (!rec) { toast('Record not found','error'); return; }
    var days = parseInt(rec.TOTAL_DAYS_ELAPSED||0,10);
    var isOver = days > 20 && rec.OB_COMPLETE !== 'TRUE';
    var pct = Math.min(100, Math.round((days/20)*100));

    var el = document.getElementById('ds-m-progress');
    if (!el) return;
    document.getElementById('ds-m-prog-dsid').value = dsId;

    // Header info
    var setText = function(id, v){ var e=document.getElementById(id); if(e) e.textContent=v||'—'; };
    setText('ds-m-prog-name',  rec.EMP_NAME);
    setText('ds-m-prog-id',    rec.EMP_ID);
    setText('ds-m-prog-desig', rec.DESIGNATION);
    setText('ds-m-prog-hr',    rec.RESPONSIBLE_HR);
    setText('ds-m-prog-start', (rec.TRANSFER_DATE||'').substring(0,10));

    // Progress bar
    var bar = document.getElementById('ds-m-prog-bar-fill');
    if (bar) {
      bar.style.width = pct + '%';
      if (rec.OB_COMPLETE === 'TRUE') {
        bar.className = 'ds-prog-bar-fill';
        bar.style.background = 'linear-gradient(90deg, #232840 0%, #448aff 40%, #00e676 100%)';
      } else if (isOver) {
        bar.className = 'ds-prog-bar-fill overstage';
        bar.style.background = 'var(--ds-red)';
      } else {
        bar.className = 'ds-prog-bar-fill';
        var mid = Math.max(20, pct * 0.5);
        bar.style.background = 'linear-gradient(90deg, #232840 0%, #448aff '+mid+'%, #00e676 100%)';
      }
    }
    var dayLbl = document.getElementById('ds-m-prog-days');
    if (dayLbl) {
      if (rec.OB_COMPLETE === 'TRUE') {
        dayLbl.textContent = 'COMPLETED \u2713';
        dayLbl.style.color = 'var(--ds-green)';
      } else if (isOver) {
        dayLbl.textContent = 'DAY ' + days + ' \u2014 OVER STAGE';
        dayLbl.style.color = 'var(--ds-red)';
      } else {
        dayLbl.textContent = 'DAY ' + days + ' / 20';
        dayLbl.style.color = days > 10 ? 'var(--ds-amber)' : 'var(--ds-cyan)';
      }
    }

    // Show/hide cancel button — hide if already complete or cancelled
    var cancelBtn = document.getElementById('ds-m-prog-cancel-btn');
    if (cancelBtn) cancelBtn.style.display = (rec.OB_COMPLETE === 'TRUE' || rec.CANCELLED === 'TRUE') ? 'none' : '';

    this._renderProgressSteps(rec);
    el.classList.add('open');
  },

  _progCancel: function() {
    var dsId = (document.getElementById('ds-m-prog-dsid')||{}).value;
    if (!dsId) return;
    this.closeProgressCard();
    this.openCancelModal(dsId);
  },

  _renderProgressSteps: function(rec) {
    var self = this;
    var dsId = rec.DS_ID;
    var stepKeys = Object.keys(this.STEPS);
    var container = document.getElementById('ds-m-prog-steps');
    if (!container) return;
    container.innerHTML = stepKeys.map(function(k, idx){
      var def        = self.STEPS[k];
      var step       = rec[k] || {status:'Pending'};
      // Enforce prereq lock display
      var isLocked   = false;
      if (def.requiresStep) {
        var prereq = rec[def.requiresStep] || {};
        if (prereq.status !== 'Done' && prereq.status !== 'Fit') {
          isLocked = true;
          step = {status: 'Locked'};
        }
      }
      var sc         = self._statusClass(step.status||'Pending');
      var isComplete = step.status==='Done' || step.status==='Fit';
      var completedInfo = isComplete && step.complete_date
        ? '<span style="font-size:10px;color:var(--ds-muted)">Completed: <span class="mono">'+esc(step.complete_date)+'</span></span>'
        : '';
      var lockedHint = isLocked
        ? '<span style="font-size:10px;color:var(--ds-muted);font-style:italic">&#128274; Requires EID &amp; Residency Stamping</span>'
        : '';
      var completeBtn = (!isComplete && !isLocked && !isReadOnly())
        ? '<button class="ds-btn cyan sm" onclick="DSAgent._progComplete(\''+dsId+'\',\''+k+'\')">&#10003; Mark Done</button>'
        : '';
      var editBtn = (!isLocked && !isReadOnly())
        ? '<button class="ds-btn ghost sm" onclick="DSAgent.openStepModal(\''+dsId+'\',\''+k+'\')" title="Edit step details">&#9998;</button>'
        : '';
      var stateClass = isComplete ? 'done' : (isLocked ? 'locked' : '');
      return '<div class="ds-prog-step '+stateClass+'" style="'+(isLocked?'opacity:.6':'')+'">'+
        '<div class="ds-prog-step-hdr">'+
          '<div class="ds-prog-step-num">'+(idx+1)+'</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:12px;font-weight:700;color:var(--ds-text)">'+esc(def.label)+'</div>'+
            '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">'+completedInfo+lockedHint+'</div>'+
          '</div>'+
          '<span class="ds-badge '+sc+'" style="flex-shrink:0">'+esc(step.status||'Pending')+'</span>'+
        '</div>'+
        '<div class="ds-prog-step-actions">'+completeBtn+editBtn+'</div>'+
      '</div>';
    }).join('');
  },

  _progComplete: function(dsId, stepKey) {
    var rec = (APP.dsTracker||[]).find(function(r){ return r.DS_ID===dsId; });
    var self = this;
    var stepLabel = (this.STEPS[stepKey]||{}).label || stepKey;
    if (!confirm('Mark "' + stepLabel + '" as complete?')) return;
    toast('Recording completion...','info');
    GAS.completeDSStep(dsId, stepKey, '', '', function(r){
      if (!r||!r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      if (rec) {
        if (!rec[stepKey]) rec[stepKey] = {};
        rec[stepKey].complete_date = r.complete_date || '';
        rec[stepKey].status        = (stepKey==='STEP_MEDICAL') ? 'Fit' : 'Done';
      }
      var stepKeys = Object.keys(self.STEPS);
      var allDone = stepKeys.every(function(k){
        var s = (rec[k]&&rec[k].status)||'Pending';
        return s==='Done'||s==='Fit';
      });
      if (allDone && rec) {
        rec.OB_COMPLETE = 'TRUE';
        var dayLbl = document.getElementById('ds-m-prog-days');
        if (dayLbl) { dayLbl.textContent = 'COMPLETED \u2713'; dayLbl.style.color = 'var(--ds-green)'; }
        var bar = document.getElementById('ds-m-prog-bar-fill');
        if (bar) { bar.style.width='100%'; bar.style.background='linear-gradient(90deg,#232840 0%,#448aff 40%,#00e676 100%)'; bar.className='ds-prog-bar-fill'; }
        toast('Onboarding COMPLETED!', 'success');
      } else {
        toast('Step marked done', 'success');
      }
      self._renderProgressSteps(rec);
      self.renderBadge();
    });
  },

  closeProgressCard: function() {
    document.getElementById('ds-m-progress').classList.remove('open');
    this.render();
  },

  // ── Analytics Tab ──
  renderAnalytics: function() {
    var el = document.getElementById('ds-tab-analytics');
    if (!el) return;
    // Use cached data if available; only hit the server on first load or after refresh
    if (this._analyticsRaw) { this._drawAnalytics(this._analyticsRaw, el); return; }
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:60px;color:var(--ds-muted)"><div style="text-align:center"><div style="font-size:28px;margin-bottom:12px;opacity:.4">&#128200;</div>Loading analytics\u2026</div></div>';
    GAS.get20DSAnalytics(function(r){
      if (!r||!r.success) { el.innerHTML = '<div class="ds-empty"><div class="ds-empty-icon">&#9888;</div>Could not load analytics.</div>'; return; }
      DSAgent._analyticsRaw = r;
      DSAgent._drawAnalytics(r, el);
    });
  },

  // Called by range buttons rendered inside the analytics tab
  _setAnalyticsRange: function(range) {
    this._analyticsRange = range;
    var el = document.getElementById('ds-tab-analytics');
    if (el && this._analyticsRaw) this._drawAnalytics(this._analyticsRaw, el);
  },

  // Called by the individual-records search input
  _setAnalyticsSearch: function(val) {
    this._analyticsSearch = val;
    var el = document.getElementById('ds-tab-analytics');
    if (el && this._analyticsRaw) this._drawAnalytics(this._analyticsRaw, el);
  },

  // Invalidate cache so next tab open re-fetches (called from refresh())
  _clearAnalyticsCache: function() { this._analyticsRaw = null; },

  _drawAnalytics: function(r, el) {
    var self = this;
    var range  = this._analyticsRange || 'all';
    var searchQ = (this._analyticsSearch || '').toLowerCase().trim();

    // ── Apply date range filter to individuals ──
    var cutMs = range === '30' ? Date.now() - 30 * 86400000
              : range === '90' ? Date.now() - 90 * 86400000
              : null;
    var allIndiv = r.individuals || [];
    var filteredIndiv = cutMs
      ? allIndiv.filter(function(emp) {
          if (!emp.transferDate) return false;
          // transferDate format: dd/MM/yyyy or yyyy-MM-dd
          var s = emp.transferDate;
          var d;
          var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
          if (m) d = new Date(+m[3], +m[2]-1, +m[1]);
          else d = new Date(s);
          return !isNaN(d) && d.getTime() >= cutMs;
        })
      : allIndiv;

    // ── Re-aggregate stats from filtered individuals ──
    var filtTotal = 0, filtDays = 0;
    var filtHrMap = {};
    filteredIndiv.forEach(function(emp) {
      filtTotal++; filtDays += emp.days;
      var hr = emp.hrName || 'Unassigned';
      if (!filtHrMap[hr]) filtHrMap[hr] = {completed:0, totalDays:0};
      filtHrMap[hr].completed++;
      filtHrMap[hr].totalDays += emp.days;
    });
    var filtAvgDays = filtTotal > 0 ? Math.round(filtDays / filtTotal * 10) / 10 : null;
    var avgColor = filtAvgDays === null ? 'var(--ds-muted)' : filtAvgDays <= 20 ? 'var(--ds-green)' : 'var(--ds-amber)';
    var avgDaysLbl = filtAvgDays !== null ? filtAvgDays + 'd' : '—';
    var totalActive = (r.overall || {}).totalActive || 0;

    // Build filtered hrReport — active count from full server data
    var fullHrMap = {};
    (r.hrReport||[]).forEach(function(h){ fullHrMap[h.name] = h.active || 0; });
    var filtHrReport = Object.keys(filtHrMap).map(function(name) {
      var d = filtHrMap[name];
      var avg = d.completed > 0 ? Math.round(d.totalDays / d.completed * 10) / 10 : null;
      return {name:name, avgDays:avg, completed:d.completed, active: fullHrMap[name] || 0};
    }).sort(function(a,b){
      if (a.avgDays===null) return 1; if (b.avgDays===null) return -1;
      return a.avgDays - b.avgDays;
    });

    // ── Range filter buttons ──
    var rangeBtn = function(val, label) {
      var active = range === val;
      return '<button onclick="DSAgent._setAnalyticsRange(\''+val+'\')" style="'+
        'padding:4px 12px;font-size:11px;font-weight:'+(active?'700':'500')+';border-radius:5px;border:1px solid '+(active?'var(--ds-cyan)':'var(--ds-border)')+
        ';background:'+(active?'var(--ds-cyan)':'var(--ds-surface)')+';color:'+(active?'#fff':'var(--ds-muted)')+';cursor:pointer">'+label+'</button>';
    };
    var rangeBtns = rangeBtn('all','All Time') + rangeBtn('90','Last 90d') + rangeBtn('30','Last 30d');

    // ── Monthly Completions Sparkline ──
    var now = new Date();
    var months = [];
    for (var mi = 5; mi >= 0; mi--) {
      var md = new Date(now.getFullYear(), now.getMonth() - mi, 1);
      months.push({year:md.getFullYear(), month:md.getMonth(),
        label:md.toLocaleString('default',{month:'short'})+' \''+String(md.getFullYear()).slice(2), count:0});
    }
    filteredIndiv.forEach(function(emp) {
      if (!emp.transferDate) return;
      var s = emp.transferDate;
      var d; var mm = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
      if (mm) d = new Date(+mm[3],+mm[2]-1,+mm[1]); else d = new Date(s);
      if (isNaN(d)) return;
      months.forEach(function(mo){ if (d.getFullYear()===mo.year && d.getMonth()===mo.month) mo.count++; });
    });
    var maxCount = 1;
    months.forEach(function(m){ if (m.count > maxCount) maxCount = m.count; });
    var sparkBars = months.map(function(m) {
      var pct = Math.max(4, Math.round((m.count / maxCount) * 100));
      var barColor = m.count === 0 ? 'var(--ds-border)' : 'var(--ds-cyan)';
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0">'+
        '<div style="font-size:11px;font-weight:700;color:'+(m.count?'var(--ds-cyan)':'var(--ds-muted)')+';">'+(m.count||'\u2013')+'</div>'+
        '<div style="width:70%;flex:1;display:flex;align-items:flex-end">'+
          '<div style="width:100%;height:'+pct+'%;min-height:4px;background:'+barColor+';border-radius:4px 4px 0 0;transition:height .6s ease"></div>'+
        '</div>'+
        '<div style="font-size:9px;color:var(--ds-muted);text-align:center;white-space:nowrap">'+m.label+'</div>'+
      '</div>';
    }).join('');

    // ── HR table ──
    var hrRows = filtHrReport.map(function(h) {
      var ac = h.avgDays === null ? 'var(--ds-muted)' : h.avgDays <= 20 ? 'var(--ds-green)' : 'var(--ds-amber)';
      return '<tr>'+
        '<td style="font-weight:600">'+esc(h.name)+'</td>'+
        '<td class="mono" style="color:'+ac+';font-weight:700">'+(h.avgDays!==null?h.avgDays+'d':'—')+'</td>'+
        '<td class="mono">'+h.completed+'</td>'+
        '<td class="mono" style="color:var(--ds-muted)">'+h.active+'</td>'+
      '</tr>';
    }).join('') || '<tr><td colspan="4"><div class="ds-empty" style="padding:10px">No completed data for this period.</div></td></tr>';

    // ── Individual records — apply search ──
    var displayIndiv = searchQ
      ? filteredIndiv.filter(function(emp){
          return (emp.empName||'').toLowerCase().indexOf(searchQ) >= 0 ||
                 (emp.empId||'').toLowerCase().indexOf(searchQ) >= 0 ||
                 (emp.hrName||'').toLowerCase().indexOf(searchQ) >= 0;
        })
      : filteredIndiv;

    var indivRows = displayIndiv.map(function(emp, idx) {
      var dColor = emp.days <= 20 ? 'var(--ds-green)' : 'var(--ds-amber)';
      return '<tr>'+
        '<td style="color:var(--ds-muted);font-size:10px;font-family:var(--ds-mono)">'+(idx+1)+'</td>'+
        '<td style="font-weight:600">'+esc(emp.empName||'—')+'</td>'+
        '<td class="mono" style="color:var(--ds-cyan);font-size:11px">'+esc(emp.empId||'—')+'</td>'+
        '<td style="font-size:11px">'+esc(emp.designation||'—')+'</td>'+
        '<td style="font-size:11px">'+esc(emp.hrName||'—')+'</td>'+
        '<td class="mono" style="font-size:11px;color:var(--ds-muted)">'+esc(emp.transferDate||'—')+'</td>'+
        '<td class="mono" style="font-weight:700;color:'+dColor+'">'+emp.days+'d</td>'+
      '</tr>';
    }).join('') || '<tr><td colspan="7"><div class="ds-empty" style="padding:14px">'+(searchQ?'No matches for "'+esc(searchQ)+'"':'No completed onboardings yet.')+'</div></td></tr>';

    el.innerHTML =
      '<div style="padding:20px 24px">'+
      // Range filter bar
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'+
        '<span style="font-size:11px;font-weight:600;color:var(--ds-muted);text-transform:uppercase;letter-spacing:.05em">Period:</span>'+
        rangeBtns+
        (range!=='all'?'<span style="font-size:10px;color:var(--ds-muted);margin-left:4px">'+filtTotal+' completed in range</span>':'')+
      '</div>'+
      // KPI row
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px">'+
        '<div class="ds-kpi cyan" style="min-width:0">'+
          '<div class="ds-kpi-icon">&#128200;</div>'+
          '<div class="ds-kpi-val" style="color:'+avgColor+'">'+avgDaysLbl+'</div>'+
          '<div class="ds-kpi-lbl">Avg Days to Complete</div>'+
        '</div>'+
        '<div class="ds-kpi green" style="min-width:0">'+
          '<div class="ds-kpi-icon">&#10003;</div>'+
          '<div class="ds-kpi-val">'+filtTotal+'</div>'+
          '<div class="ds-kpi-lbl">'+(range==='all'?'Total':'Period')+' Completed</div>'+
        '</div>'+
        '<div class="ds-kpi purple" style="min-width:0">'+
          '<div class="ds-kpi-icon">&#9654;</div>'+
          '<div class="ds-kpi-val">'+totalActive+'</div>'+
          '<div class="ds-kpi-lbl">Currently Active</div>'+
        '</div>'+
      '</div>'+
      // HR table + sparkline row
      '<div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px">'+
        '<div class="ds-table-card">'+
          '<div class="ds-table-hdr"><span class="ds-table-hdr-title">&#128101; HR Performance — Avg Days to Complete</span></div>'+
          '<div class="ds-tbl-wrap"><table class="ds-tbl">'+
            '<thead><tr><th>Responsible HR</th><th>Avg Days</th><th>Completed</th><th>Active</th></tr></thead>'+
            '<tbody>'+hrRows+'</tbody>'+
          '</table></div>'+
        '</div>'+
        '<div class="ds-table-card">'+
          '<div class="ds-table-hdr"><span class="ds-table-hdr-title">&#128202; Monthly Completions</span></div>'+
          '<div style="padding:12px 16px 8px;display:flex;align-items:flex-end;gap:6px;height:160px;box-sizing:border-box">'+sparkBars+'</div>'+
        '</div>'+
      '</div>'+
      // Individual records
      '<div class="ds-table-card">'+
        '<div class="ds-table-hdr" style="flex-wrap:wrap;gap:8px">'+
          '<span class="ds-table-hdr-title">&#9989; Completed Onboardings — Individual Records</span>'+
          '<div style="display:flex;align-items:center;gap:8px;margin-left:auto">'+
            '<input type="text" placeholder="Search name, ID, HR…" value="'+esc(searchQ)+'"'+
              ' oninput="DSAgent._setAnalyticsSearch(this.value)"'+
              ' style="padding:4px 10px;font-size:11px;border:1px solid var(--ds-border);border-radius:5px;background:var(--ds-surface);color:var(--ds-text);width:200px">'+
            '<span style="font-size:10px;color:var(--ds-muted)">'+displayIndiv.length+' record'+(displayIndiv.length!==1?'s':'')+' · fastest first</span>'+
          '</div>'+
        '</div>'+
        '<div class="ds-tbl-wrap"><table class="ds-tbl">'+
          '<thead><tr><th style="width:32px">#</th><th>Name</th><th>Emp ID</th><th>Designation</th><th>Hired By</th><th>Start Date</th><th>Days Taken</th></tr></thead>'+
          '<tbody>'+indivRows+'</tbody>'+
        '</table></div>'+
      '</div>'+
      '</div>';
  },

  // ── Step Modal ──
  openStepModal: function(dsId, stepKey) {
    var rec = (APP.dsTracker||[]).find(function(r){ return r.DS_ID === dsId; });
    if (!rec) { toast('Record not found','error'); return; }
    var stepDef = this.STEPS[stepKey];
    if (!stepDef) return;
    // Block editing ASSD until EID is complete
    if (stepDef.requiresStep) {
      var prereq = rec[stepDef.requiresStep] || {};
      if (prereq.status !== 'Done' && prereq.status !== 'Fit') {
        toast('ASSD is locked until EID & Residency Stamping is completed.', 'error');
        return;
      }
    }
    var stepData = rec[stepKey] || {status:'Pending',responsible:'',substeps:{},complete_date:'',notes:'',reason:''};

    document.getElementById('ds-m-step-dsid').value  = dsId;
    document.getElementById('ds-m-step-key').value   = stepKey;
    document.getElementById('ds-m-step-title').textContent = stepDef.label;

    // Populate status options
    var sel = document.getElementById('ds-m-step-status');
    sel.innerHTML = stepDef.statuses.map(function(s){ return '<option value="'+s+'"'+(s===stepData.status?' selected':'')+'>'+s+'</option>'; }).join('');

    // Auto-fill responsible with logged-in user if not already set
    document.getElementById('ds-m-step-responsible').value = stepData.responsible || rec.RESPONSIBLE_HR || (APP.user && APP.user.name) || '';
    // Default complete date to today if not already set
    var todayStr = new Date().toISOString().substring(0, 10);
    document.getElementById('ds-m-step-complete').value = stepData.complete_date || todayStr;
    document.getElementById('ds-m-step-notes').value    = stepData.notes         || '';
    document.getElementById('ds-m-step-reason').value   = stepData.reason        || '';

    // Substeps
    var substepDefs = stepDef.substeps || {};
    var substepVals = stepData.substeps || {};
    var subContainer = document.getElementById('ds-m-step-substeps');
    subContainer.innerHTML = Object.keys(substepDefs).map(function(sk){
      var checked = substepVals[sk] ? 'checked' : '';
      var cls = substepVals[sk] ? 'ds-substep-row checked' : 'ds-substep-row';
      return '<div class="'+cls+'" onclick="DSAgent._toggleSubstep(this,\''+sk+'\')" data-sk="'+sk+'" data-checked="'+(substepVals[sk]?'1':'0')+'">'+
        '<div class="ds-substep-toggle">'+(substepVals[sk]?'&#10003;':'')+'</div>'+
        '<div class="ds-substep-label">'+esc(substepDefs[sk])+'</div>'+
      '</div>';
    }).join('');

    // NSI training date
    var nsiRow = document.getElementById('ds-m-nsi-training-date-row');
    if (nsiRow) {
      nsiRow.style.display = (stepKey === 'STEP_NSI') ? 'block' : 'none';
      if (stepKey === 'STEP_NSI') {
        document.getElementById('ds-m-nsi-training-date').value = (stepData.substeps && stepData.substeps.training_date) || '';
      }
    }

    this._onStepStatusChange();
    document.getElementById('ds-m-step').classList.add('open');
  },

  _toggleSubstep: function(el, sk) {
    var checked = el.dataset.checked === '1';
    checked = !checked;
    el.dataset.checked = checked ? '1' : '0';
    el.classList.toggle('checked', checked);
    var toggle = el.querySelector('.ds-substep-toggle');
    if (toggle) { toggle.innerHTML = checked ? '&#10003;' : ''; }
  },

  _onStepStatusChange: function() {
    var sel = document.getElementById('ds-m-step-status');
    var status = sel ? sel.value : '';
    var reasonRow = document.getElementById('ds-m-step-reason-row');
    var needsReason = ['Problem','Unfit'].indexOf(status) >= 0;
    if (reasonRow) reasonRow.style.display = needsReason ? 'block' : 'none';
  },

  closeStepModal: function() {
    document.getElementById('ds-m-step').classList.remove('open');
  },

  saveStep: function() {
    var dsId    = document.getElementById('ds-m-step-dsid').value;
    var stepKey = document.getElementById('ds-m-step-key').value;
    var status  = document.getElementById('ds-m-step-status').value;
    var stepDef = this.STEPS[stepKey];
    if (!stepDef) return;

    // Collect substeps
    var substeps = {};
    document.querySelectorAll('#ds-m-step-substeps .ds-substep-row').forEach(function(el){
      substeps[el.dataset.sk] = (el.dataset.checked === '1');
    });
    // NSI training date
    var nsiDateEl = document.getElementById('ds-m-nsi-training-date');
    if (stepKey === 'STEP_NSI' && nsiDateEl) substeps.training_date = nsiDateEl.value;

    var stepData = {
      status:        status,
      responsible:   document.getElementById('ds-m-step-responsible').value.trim(),
      substeps:      substeps,
      complete_date: document.getElementById('ds-m-step-complete').value,
      notes:         document.getElementById('ds-m-step-notes').value.trim(),
      reason:        document.getElementById('ds-m-step-reason').value.trim()
    };

    var self = this;
    GAS.update20DSStep(dsId, stepKey, stepData, function(r){
      if (!r||!r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      // Update local state
      var rec = (APP.dsTracker||[]).find(function(x){ return x.DS_ID===dsId; });
      if (rec) {
        rec[stepKey] = stepData;
        var stepKeys = Object.keys(self.STEPS);
        var allDone = stepKeys.every(function(k){
          var s = (rec[k]&&rec[k].status)||'Pending';
          return s==='Done'||s==='Fit';
        });
        rec.OB_COMPLETE = allDone ? 'TRUE' : 'FALSE';
      }
      toast(stepDef.label + ' updated to ' + status, 'success');
      self.closeStepModal();
      self.render();
    });
  },

  // ── Cancel Modal ──
  openCancelModal: function(dsId) {
    document.getElementById('ds-m-cancel-dsid').value = dsId;
    document.getElementById('ds-m-cancel-reason').value = '';
    document.getElementById('ds-m-cancel').classList.add('open');
  },
  closeCancelModal: function() {
    document.getElementById('ds-m-cancel').classList.remove('open');
  },
  confirmCancel: function() {
    var dsId   = document.getElementById('ds-m-cancel-dsid').value;
    var reason = document.getElementById('ds-m-cancel-reason').value.trim();
    if (!reason) { toast('Please provide a cancellation reason','error'); return; }
    var self = this;
    GAS.cancel20DSRecord(dsId, reason, function(r){
      if (!r||!r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      var rec = (APP.dsTracker||[]).find(function(x){ return x.DS_ID===dsId; });
      if (rec) {
        rec.CANCELLED      = 'TRUE';
        rec.CANCEL_REASON  = reason;
        rec.CANCELLED_BY   = (APP.user&&APP.user.name)||'';
        rec.CANCELLED_ON   = new Date().toLocaleDateString('en-GB');
      }
      toast('Record cancelled','info');
      self.closeCancelModal();
      self.render();
    });
  },

  // ── Responsible HR Modal ──
  openResponsibleModal: function(dsId) {
    var rec = (APP.dsTracker||[]).find(function(r){ return r.DS_ID===dsId; });
    document.getElementById('ds-m-resp-dsid').value = dsId;
    document.getElementById('ds-m-resp-name').value = (rec && rec.RESPONSIBLE_HR) || '';
    document.getElementById('ds-m-responsible').classList.add('open');
  },
  closeResponsibleModal: function() {
    document.getElementById('ds-m-responsible').classList.remove('open');
  },
  saveResponsible: function() {
    var dsId = document.getElementById('ds-m-resp-dsid').value;
    var hr   = document.getElementById('ds-m-resp-name').value.trim();
    if (!hr) { toast('Please enter HR officer name','error'); return; }
    var self = this;
    GAS.update20DSResponsible(dsId, hr, function(r){
      if (!r||!r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      var rec = (APP.dsTracker||[]).find(function(x){ return x.DS_ID===dsId; });
      if (rec) rec.RESPONSIBLE_HR = hr;
      toast('Responsible HR updated','success');
      self.closeResponsibleModal();
      self.render();
    });
  }
};

// ============================================================
// RESIGNATION AGENT — Deletion_Log viewer (newest first)
// ============================================================
var ResignationAgent = {
  _data: [],

  // Normalise any date string to DD/MM/YYYY
  _fmt: function(s) {
    if(!s || s === '—') return '—';
    // Already DD/MM/YYYY
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
    // YYYY-MM-DD
    var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m) return m[3]+'/'+m[2]+'/'+m[1];
    // Fallback: try JS Date parse (handles GAS toString output)
    var d = new Date(s);
    if(!isNaN(d)) return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
    return s;
  },

  // Parse a DD/MM/YYYY (or YYYY-MM-DD) string to a Date object
  _toDate: function(s) {
    if(!s) return null;
    var m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if(m) return new Date(Number(m[3]), Number(m[2])-1, Number(m[1]));
    m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    var d = new Date(s);
    return isNaN(d) ? null : d;
  },

  // Returns "X yr Y mo" or "X mo" calculated between join and exit dates
  _yos: function(joinStr, exitStr) {
    var join = this._toDate(joinStr);
    var exit = this._toDate(exitStr);
    if(!join || !exit || exit < join) return '—';
    var years  = exit.getFullYear() - join.getFullYear();
    var months = exit.getMonth()    - join.getMonth();
    if(exit.getDate() < join.getDate()) months--;
    if(months < 0) { years--; months += 12; }
    if(years < 0)  return '—';
    if(years === 0 && months === 0) return '< 1 mo';
    if(years === 0) return months + ' mo';
    if(months === 0) return years + ' yr' + (years !== 1 ? 's' : '');
    return years + ' yr ' + months + ' mo';
  },

  load: function() {
    var tb = document.getElementById('res-tbody');
    if(tb) tb.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--muted)">Loading...</td></tr>';
    GAS.getResignations(function(r) {
      if(!r || !r.success) { toast('Error loading resignations','error'); return; }
      ResignationAgent._data = r.data || [];
      ResignationAgent.render();
    });
  },

  _filtered: function() {
    var q   = (document.getElementById('res-q')||{}).value||'';
    var qs  = q.toLowerCase();
    var org = (document.getElementById('res-org')||{}).value||'';
    return this._data.filter(function(r) {
      var match = !qs ||
        (r.EMP_ID||'').toLowerCase().indexOf(qs)>=0 ||
        (r.FULL_NAME||'').toLowerCase().indexOf(qs)>=0;
      var matchOrg = !org || (r.GROUP||r.ENTITY||'') === org;
      return match && matchOrg;
    });
  },

  render: function() {
    var tb  = document.getElementById('res-tbody'); if(!tb) return;
    var cnt = document.getElementById('res-cnt');
    var data = this._filtered();
    if(cnt) cnt.textContent = data.length;
    if(!data.length) {
      tb.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:32px;color:var(--muted)">No resignation records found.</td></tr>';
      return;
    }
    // Reset bulk controls
    var selAll = document.getElementById('res-sel-all'); if(selAll) selAll.checked = false;
    var bulkBtn = document.getElementById('res-bulk-btn'); if(bulkBtn) bulkBtn.style.display = 'none';
    var bulkCnt = document.getElementById('res-bulk-count'); if(bulkCnt) bulkCnt.textContent = '0';
    var self = this;
    tb.innerHTML = data.map(function(r, idx) {
      var org     = r.GROUP || r.ENTITY || '—';
      var entCls  = {USG:'bp',UG:'bs',UST:'bo','USG-M':'bn'}[org]||'bn';
      var joinFmt = self._fmt(r.DATE_OF_JOIN  || '');
      var exitFmt = self._fmt(r.DELETED_DATE  || '');
      var yos     = self._yos(r.DATE_OF_JOIN  || '', r.DELETED_DATE || '');
      var chkTd = '<td><input type="checkbox" class="res-chk" data-empid="'+esc(r.EMP_ID||'')+'" data-name="'+esc((r.FULL_NAME||'').replace(/"/g,'&quot;'))+'" onchange="ResignationAgent.updateBulkCount()"/></td>';
      var btnHtml = '<button class="btn btn-secondary btn-sm" style="font-size:10.5px;white-space:nowrap" '+
          'data-exltr="'+esc(r.EMP_ID||'')+'" '+
          'onclick="genExpLetter(\''+esc(r.EMP_ID||'')+'\',\''+esc((r.FULL_NAME||'').replace(/'/g,''))+'\')">'+
          '&#128196; Exp Letter</button>';
      return '<tr>'+
        chkTd+
        '<td style="color:var(--muted2);font-size:11px;text-align:center">'+(idx+1)+'</td>'+
        '<td style="font-family:monospace;font-size:11.5px;font-weight:600;color:var(--navy)">'+esc(r.EMP_ID||'—')+'</td>'+
        '<td style="font-weight:600">'+esc(r.FULL_NAME||'—')+'</td>'+
        '<td style="font-size:11.5px;color:var(--muted)">'+esc(r.DESIGNATION||'—')+'</td>'+
        '<td style="font-size:11.5px">'+esc(joinFmt)+'</td>'+
        '<td style="font-size:11.5px;font-weight:600;color:var(--red,#c83030)">'+esc(exitFmt)+'</td>'+
        '<td style="font-size:11px;font-weight:600;color:var(--teal,#007a8a);white-space:nowrap">'+esc(yos)+'</td>'+
        '<td><span class="badge '+entCls+'">'+esc(org)+'</span></td>'+
        '<td style="font-size:11px;color:var(--muted);max-width:160px;word-break:break-word">'+esc(r.REASON||'—')+'</td>'+
        '<td>'+btnHtml+'</td>'+
      '</tr>';
    }).join('');
  },

  updateBulkCount: function() {
    var checked = document.querySelectorAll('.res-chk:checked');
    var btn = document.getElementById('res-bulk-btn');
    var cnt = document.getElementById('res-bulk-count');
    if(cnt) cnt.textContent = checked.length;
    if(btn) btn.style.display = checked.length ? '' : 'none';
  },
  toggleSelectAll: function(checked) {
    document.querySelectorAll('.res-chk').forEach(function(c){ c.checked = checked; });
    this.updateBulkCount();
  },
  generateBulk: function() {
    var items = [];
    document.querySelectorAll('.res-chk:checked').forEach(function(c){
      items.push({id: c.dataset.empid, name: c.dataset.name});
    });
    if(!items.length){ toast('No employees selected','error'); return; }
    var btn = document.getElementById('res-bulk-btn');
    if(btn) btn.disabled = true;
    toast('Generating '+items.length+' letter'+(items.length>1?'s':'')+'…','info');
    var idx = 0, collectedPdfs = [];
    function next() {
      if(idx >= items.length){
        if(!collectedPdfs.length){ toast('No PDFs generated','error'); if(btn) btn.disabled=false; return; }
        toast('Merging '+collectedPdfs.length+' PDFs…','info');
        var mFile = 'Experience_Letters_'+collectedPdfs.length+'_employees.pdf';
        _mergeBulkExpPdfs(collectedPdfs, function(url){
          _openPdfResult(url, mFile);
          if(btn){ btn.disabled=false; btn.style.display='none'; }
          var sa=document.getElementById('res-sel-all'); if(sa) sa.checked=false;
          GAS.call('getHRDocs',[],function(dr){
            if(dr&&dr.success){ APP.hrDocs=dr.data||[]; LtrAgent.render(); ResignationAgent.render(); }
          });
        });
        return;
      }
      var item = items[idx++];
      toast('('+(idx)+'/'+items.length+') '+esc(item.name)+'…','info');
      genExpLetter(item.id, item.name, function(pdf){ if(pdf) collectedPdfs.push(pdf); next(); });
    }
    next();
  },

  resetF: function() {
    var q=document.getElementById('res-q');   if(q)   q.value='';
    var o=document.getElementById('res-org'); if(o)   o.value='';
    this.render();
  }
};
</script>
