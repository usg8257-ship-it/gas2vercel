// ============================================================
// STEP MANAGEMENT AGENT
// ============================================================
var StepMgmtAgent = {
  _steps: [],       // current live array (ordered)
  _statuses: [],    // being built in modal

  // ── Load & Render list ──────────────────────────────────────
  reload: function() {
    var self = this;
    // Use cached data if available, refresh in background
    if (APP.stepConfig && APP.stepConfig.length && !self._steps.length) {
      self._steps = APP.stepConfig.slice();
      self.renderList();
    }
    call('getStepConfig', [], function(r) {
      if (!r || !r.success) { toast('Could not load steps', 'error'); return; }
      self._steps = r.data || [];
      APP.stepConfig = self._steps;
      self.renderList();
    });
  },

  renderList: function() {
    var el = document.getElementById('step-mgmt-list');
    if (!el) return;
    if (!this._steps.length) {
      el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">No steps configured yet.</div>';
      return;
    }
    var self = this;
    var rows = this._steps.map(function(s, idx) {
      var substepCount = Object.keys(s.substeps || {}).length;
      var slaColor = s.slaHours > 96 ? 'var(--gold)' : 'var(--teal)';
      return '<tr>'+
        '<td style="width:30px;color:var(--muted);font-size:11px;text-align:center">'+
          '<span style="cursor:grab;font-size:14px" title="Drag to reorder">⠿</span>'+
        '</td>'+
        '<td style="width:26px;text-align:center">'+
          '<span style="background:var(--navy);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">'+
            esc(s.short)+'</span></td>'+
        '<td><span style="font-weight:600;font-size:13px">'+esc(s.label)+'</span>'+
            '<div style="font-size:10px;font-family:monospace;color:var(--muted);margin-top:1px">'+esc(s.key)+'</div></td>'+
        '<td style="font-size:11px;color:'+slaColor+';font-weight:600">'+s.slaHours+'h SLA</td>'+
        '<td style="font-size:10px">'+
          s.statuses.map(function(st){ return '<span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin:1px 2px;display:inline-block">'+esc(st)+'</span>'; }).join('')+
        '</td>'+
        '<td style="font-size:11px;color:var(--muted)">'+substepCount+' substep'+(substepCount!==1?'s':'')+'</td>'+
        '<td style="white-space:nowrap">'+
          '<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px" onclick="StepMgmtAgent.openEdit('+idx+')">&#9998; Edit</button> '+
          (idx > 0 ? '<button class="btn btn-secondary btn-sm" style="padding:2px 7px;font-size:11px" onclick="StepMgmtAgent.moveUp('+idx+')" title="Move up">&#8593;</button> ' : '')+
          (idx < self._steps.length-1 ? '<button class="btn btn-secondary btn-sm" style="padding:2px 7px;font-size:11px" onclick="StepMgmtAgent.moveDown('+idx+')" title="Move down">&#8595;</button> ' : '')+
          '<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px;color:var(--red)" onclick="StepMgmtAgent.removeStep('+idx+')" title="Remove step">&#128465;</button>'+
        '</td>'+
      '</tr>';
    }).join('');
    el.innerHTML =
      '<table style="width:100%;border-collapse:collapse;font-size:12px">'+
      '<thead><tr style="background:var(--surface2)">'+
        '<th style="padding:6px 8px;width:30px"></th>'+
        '<th style="padding:6px 8px;width:40px">Pill</th>'+
        '<th style="padding:6px 8px;text-align:left">Step</th>'+
        '<th style="padding:6px 8px">SLA</th>'+
        '<th style="padding:6px 8px;text-align:left">Statuses</th>'+
        '<th style="padding:6px 8px">Substeps</th>'+
        '<th style="padding:6px 8px">Actions</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
      '</table>'+
      '<div style="margin-top:12px;text-align:right">'+
        '<button class="btn btn-navy" onclick="StepMgmtAgent.saveAll()">&#128190; Save Changes</button>'+
      '</div>';
  },

  moveUp: function(idx) {
    if (idx <= 0) return;
    var tmp = this._steps[idx-1]; this._steps[idx-1] = this._steps[idx]; this._steps[idx] = tmp;
    this.renderList();
  },
  moveDown: function(idx) {
    if (idx >= this._steps.length-1) return;
    var tmp = this._steps[idx+1]; this._steps[idx+1] = this._steps[idx]; this._steps[idx] = tmp;
    this.renderList();
  },
  removeStep: function(idx) {
    var s = this._steps[idx];
    if (!s) return;
    if (!confirm('Remove step "'+s.label+'"?\n\nExisting tracker data for this step will remain in the sheet but the step will no longer appear in new records.')) return;
    this._steps.splice(idx, 1);
    this.renderList();
  },

  saveAll: function() {
    var self = this;
    if (!this._steps.length) { toast('No steps to save','error'); return; }
    call('saveStepConfig', [this._steps], function(r) {
      if (!r || !r.success) { toast(r&&r.error||'Save failed','error'); return; }
      DSAgent.applyStepConfig(self._steps);
      APP.stepConfig = self._steps;
      toast('Steps saved — Progress Tracker updated', 'success');
    });
  },

  // ── Add / Edit modal ────────────────────────────────────────
  openAdd: function() {
    document.getElementById('sm-m-mode').value = 'add';
    document.getElementById('sm-m-orig-key').value = '';
    document.getElementById('sm-modal-title').textContent = 'Add Step';
    document.getElementById('sm-m-key').value = '';
    document.getElementById('sm-m-key').disabled = false;
    document.getElementById('sm-m-label').value = '';
    document.getElementById('sm-m-short').value = '';
    document.getElementById('sm-m-sla').value = '24';
    this._statuses = ['Pending','Done'];
    this._renderStatusChips();
    document.getElementById('sm-m-substeps-list').innerHTML = '';
    s('sm-modal-backdrop','display:block'); s('sm-modal','display:block');
    setTimeout(function(){ var e=document.getElementById('sm-m-key'); if(e) e.focus(); }, 80);
  },

  openEdit: function(idx) {
    var step = this._steps[idx];
    if (!step) return;
    document.getElementById('sm-m-mode').value = 'edit';
    document.getElementById('sm-m-orig-key').value = step.key;
    document.getElementById('sm-modal-title').textContent = 'Edit Step';
    document.getElementById('sm-m-key').value = step.key;
    document.getElementById('sm-m-key').disabled = true;
    document.getElementById('sm-m-label').value = step.label;
    document.getElementById('sm-m-short').value = step.short;
    document.getElementById('sm-m-sla').value = step.slaHours;
    this._statuses = step.statuses.slice();
    this._renderStatusChips();
    // Substeps
    var subList = document.getElementById('sm-m-substeps-list');
    subList.innerHTML = '';
    Object.keys(step.substeps||{}).forEach(function(sk) {
      StepMgmtAgent._appendSubstepRow(sk, step.substeps[sk]);
    });
    s('sm-modal-backdrop','display:block'); s('sm-modal','display:block');
  },

  _renderStatusChips: function() {
    var el = document.getElementById('sm-m-statuses-chips');
    if (!el) return;
    el.innerHTML = this._statuses.map(function(st, i) {
      return '<span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px">'+
        esc(st)+
        '<span style="cursor:pointer;color:var(--red);font-weight:700;font-size:12px;line-height:1" onclick="StepMgmtAgent.removeStatus('+i+')">&#10005;</span>'+
      '</span>';
    }).join('');
  },

  onStatusKey: function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      var val = e.target.value.trim().replace(/,$/,'');
      if (val && this._statuses.indexOf(val) < 0) {
        this._statuses.push(val);
        this._renderStatusChips();
      }
      e.target.value = '';
    }
  },

  removeStatus: function(idx) {
    this._statuses.splice(idx, 1);
    this._renderStatusChips();
  },

  addSubstepRow: function(key, label) { this._appendSubstepRow(key||'', label||''); },

  _appendSubstepRow: function(key, label) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:6px;margin-bottom:5px;align-items:center';
    row.innerHTML =
      '<input type="text" class="fi" placeholder="substep_key" style="width:160px;margin:0;font-family:monospace;font-size:11px" value="'+esc(key)+'" data-role="ss-key" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,\'_\')"/>'+
      '<input type="text" class="fi" placeholder="Label" style="flex:1;margin:0;font-size:12px" value="'+esc(label)+'" data-role="ss-label"/>'+
      '<button class="btn btn-secondary btn-sm" style="padding:2px 7px;color:var(--red)" type="button" onclick="this.parentNode.remove()">&#10005;</button>';
    document.getElementById('sm-m-substeps-list').appendChild(row);
  },

  _collectSubsteps: function() {
    var rows = document.getElementById('sm-m-substeps-list').querySelectorAll('div');
    var obj = {};
    rows.forEach(function(row) {
      var k = (row.querySelector('[data-role="ss-key"]')||{}).value || '';
      var v = (row.querySelector('[data-role="ss-label"]')||{}).value || '';
      k = k.trim(); v = v.trim();
      if (k && v) obj[k] = v;
    });
    return obj;
  },

  save: function() {
    var mode  = document.getElementById('sm-m-mode').value;
    var key   = document.getElementById('sm-m-key').value.trim();
    var label = document.getElementById('sm-m-label').value.trim();
    var short = document.getElementById('sm-m-short').value.trim().toUpperCase();
    var sla   = Number(document.getElementById('sm-m-sla').value) || 24;
    // Flush any partially-typed status
    var pendingInput = document.getElementById('sm-m-status-input');
    if (pendingInput && pendingInput.value.trim()) {
      var v = pendingInput.value.trim();
      if (this._statuses.indexOf(v) < 0) this._statuses.push(v);
      pendingInput.value = '';
      this._renderStatusChips();
    }
    if (!key)   { toast('Step key is required','error'); return; }
    if (!label) { toast('Label is required','error'); return; }
    if (!short) { toast('Short code is required','error'); return; }
    if (!this._statuses.length) { toast('Add at least one status','error'); return; }
    if (!/^STEP_[A-Z0-9_]+$/.test(key)) { toast('Key must start with STEP_ and use only uppercase letters, numbers, underscores','error'); return; }
    var substeps = this._collectSubsteps();
    var stepObj = { key:key, label:label, short:short, slaHours:sla, statuses:this._statuses.slice(), substeps:substeps };
    if (mode === 'add') {
      if (this._steps.some(function(s){ return s.key === key; })) { toast('A step with this key already exists','error'); return; }
      this._steps.push(stepObj);
    } else {
      var origKey = document.getElementById('sm-m-orig-key').value;
      var idx = this._steps.findIndex(function(s){ return s.key === origKey; });
      if (idx >= 0) this._steps[idx] = stepObj;
    }
    this.renderList();
    this.closeModal();
    toast('Step '+(mode==='add'?'added':'updated')+' — click "Save Changes" to persist', 'info');
  },

  closeModal: function() {
    s('sm-modal-backdrop','display:none'); s('sm-modal','display:none');
  },

  // ── Merge flow ──────────────────────────────────────────────
  openMerge: function() {
    var opts = this._steps.map(function(s){ return '<option value="'+esc(s.key)+'">'+esc(s.label)+' ('+esc(s.key)+')</option>'; }).join('');
    document.getElementById('sm-mg-keyA').innerHTML = opts;
    document.getElementById('sm-mg-keyB').innerHTML = opts;
    if (this._steps.length >= 2) document.getElementById('sm-mg-keyB').selectedIndex = 1;
    ['sm-mg-key','sm-mg-label','sm-mg-short','sm-mg-sla','sm-mg-statuses'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('sm-mg-preview').style.display = 'none';
    s('sm-merge-backdrop','display:block'); s('sm-merge-modal','display:block');
    this.onMergeSelChange();
  },

  onMergeSelChange: function() {
    var kA = document.getElementById('sm-mg-keyA') ? document.getElementById('sm-mg-keyA').value : '';
    var kB = document.getElementById('sm-mg-keyB') ? document.getElementById('sm-mg-keyB').value : '';
    var sA = this._steps.find(function(s){ return s.key===kA; });
    var sB = this._steps.find(function(s){ return s.key===kB; });
    var prev = document.getElementById('sm-mg-preview');
    var prevBody = document.getElementById('sm-mg-substep-preview');
    if (!sA || !sB || kA === kB) { if(prev) prev.style.display='none'; return; }
    // Build combined substep preview
    var combined = {};
    Object.keys(sA.substeps||{}).forEach(function(k){ combined[k] = sA.substeps[k]+' <span style="color:var(--teal);font-size:10px">(from '+esc(sA.short)+')</span>'; });
    Object.keys(sB.substeps||{}).forEach(function(k){
      if (!combined[k]) combined[k] = sB.substeps[k]+' <span style="color:var(--purple);font-size:10px">(from '+esc(sB.short)+')</span>';
    });
    if(prevBody) prevBody.innerHTML = Object.keys(combined).length
      ? Object.keys(combined).map(function(k){ return '<div style="font-size:11px;padding:2px 0">&#10003; <code style="font-size:10px">'+esc(k)+'</code> — '+combined[k]+'</div>'; }).join('')
      : '<div style="color:var(--muted);font-size:11px">No substeps on either step.</div>';
    if(prev) prev.style.display = 'block';
    // Auto-suggest merged SLA
    var slaEl = document.getElementById('sm-mg-sla');
    if(slaEl && !slaEl.value) slaEl.value = Math.max(sA.slaHours||24, sB.slaHours||24);
    // Auto-suggest statuses
    var stEl = document.getElementById('sm-mg-statuses');
    if(stEl && !stEl.value) {
      var merged = (sA.statuses || []).slice();
      (sB.statuses || []).forEach(function(st){ if(merged.indexOf(st)<0) merged.push(st); });
      stEl.value = merged.join(',');
    }
  },

  confirmMerge: function() {
    var kA  = document.getElementById('sm-mg-keyA').value;
    var kB  = document.getElementById('sm-mg-keyB').value;
    var key = document.getElementById('sm-mg-key').value.trim();
    var lbl = document.getElementById('sm-mg-label').value.trim();
    var sht = document.getElementById('sm-mg-short').value.trim().toUpperCase();
    var sla = Number(document.getElementById('sm-mg-sla').value) || 48;
    var sts = (document.getElementById('sm-mg-statuses').value||'Pending,Done').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    if (!kA || !kB || kA===kB) { toast('Select two different steps to merge','error'); return; }
    if (!key)  { toast('New step key is required','error'); return; }
    if (!lbl)  { toast('New step label is required','error'); return; }
    if (!sht)  { toast('Short code is required','error'); return; }
    if (!/^STEP_[A-Z0-9_]+$/.test(key)) { toast('Invalid key format','error'); return; }
    // Build combined substeps
    var sA = this._steps.find(function(s){ return s.key===kA; });
    var sB = this._steps.find(function(s){ return s.key===kB; });
    var combinedSubs = {};
    if(sA) Object.keys(sA.substeps||{}).forEach(function(k){ combinedSubs[k]=sA.substeps[k]; });
    if(sB) Object.keys(sB.substeps||{}).forEach(function(k){ if(!combinedSubs[k]) combinedSubs[k]=sB.substeps[k]; });
    var newStep = { key:key, label:lbl, short:sht, slaHours:sla, statuses:sts, substeps:combinedSubs };
    if (!confirm('Merge "'+kA+'" + "'+kB+'" → "'+key+'"?\n\nThis is permanent and will migrate all existing tracker records.')) return;
    call('mergeSteps', [kA, kB, newStep], function(r) {
      if (!r||!r.success) { toast(r&&r.error||'Merge failed','error'); return; }
      toast('Merged successfully — '+r.migratedCount+' tracker records updated', 'success');
      StepMgmtAgent.closeMerge();
      StepMgmtAgent.reload();
    });
  },

  closeMerge: function() {
    s('sm-merge-backdrop','display:none'); s('sm-merge-modal','display:none');
  },
};

// ============================================================
// AGENT MANAGER — 15 min refresh, no refresh during editing
// ============================================================
var AgentManager={
  _lastSync:null, _timerInterval:null,

  init:function(){
    var self=this;
    this._months();
    this._showLoader(true);
    this._startTimer();
    // 15 MINUTE auto-refresh — skip if editing
    setInterval(function(){
      if(EDITING){ return; }
      self.refreshAll();
    }, 15*60*1000);
    GAS.loadAll(function(){
      self._showLoader(false);
      self._lastSync=Date.now();
      var role = APP.user ? APP.user.role : 'NONE';
      if(!APP.user || role === 'NONE') {
        showAccessDenied();
        return;
      }
      if(role === 'EMPLOYEE') {
        showSelfServicePortal();
        return;
      }
      renderNav();
      EmpAgent.render(true);
      OBAgent.render();
      LtrAgent.render();
      DashAgent.refresh();
      CFG.loadUI();
      DSAgent.renderBadge();
      AlertAgent.updateBell();
      var sl=document.getElementById('sync-label');
      if(sl) sl.textContent='Data Synced via Google';
      toast('Dashboard loaded - '+getActiveEmployees().length.toLocaleString()+' active employees','success');
    });
  },

  _startTimer:function(){
    var self=this;
    if(this._timerInterval) clearInterval(this._timerInterval);
    this._timerInterval=setInterval(function(){
      if(!self._lastSync) return;
      var elapsed=Math.floor((Date.now()-self._lastSync)/1000);
      var m=Math.floor(elapsed/60), s=elapsed%60;
      var display=m>0?m+'m '+String(s).padStart(2,'0')+'s ago':String(s).padStart(2,'0')+'s ago';
      var el=document.getElementById('sync-timer'); if(el) el.textContent=display;
    },1000);
  },

  refreshAll:function(){
    var self=this;
    var sl=document.getElementById('sync-label'); if(sl) sl.textContent='Syncing...';
    GAS.loadAll(function(){
      self._lastSync=Date.now();
      var role = APP.user ? APP.user.role : 'NONE';
      if(role !== 'NONE' && role !== 'EMPLOYEE') {
        renderNav();
        EmpAgent.render(true); OBAgent.render(); LtrAgent.render(); DashAgent.refresh();
        DSAgent.renderBadge(); AlertAgent.updateBell();
      }
      var sl2=document.getElementById('sync-label'); if(sl2) sl2.textContent='Connected to live data via Google';
      var el=document.getElementById('sync-timer'); if(el) el.textContent='just now';
      toast('Data refreshed','info');
    });
  },

  _months:function(){
    var sel=document.getElementById('rpt-month'); if(!sel) return;
    var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var now=new Date();
    for(var i=0;i<12;i++){
      var d=new Date(now.getFullYear(),now.getMonth()-i,1);
      var opt=document.createElement('option');
      opt.value=opt.textContent=mn[d.getMonth()]+' '+d.getFullYear();
      sel.appendChild(opt);
    }
  },

  _showLoader:function(show){
    var loader=document.getElementById('main-loader');
    var content=document.getElementById('main-content');
    if(loader)  loader.style.display=show?'flex':'none';
    if(content) content.style.display=show?'none':'block';
  }
};

function renderNav() {
  var role = APP.user ? APP.user.role : 'NONE';

  // Full access rules — who can navigate to & use this view
  var rules = {
    'dashboard':    ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF'],
    'onboarding':   ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF'],
    '20dstracker':  ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF'],
    'employees':    ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF'],
    'resignations': ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER'],
    'masterdata':   ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER'],
    'letters':      ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER'],
    'leave':        ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER'],
    'recruitment':  ['SUPER_ADMIN','HR_OFFICER'],
    'reports':      ['SUPER_ADMIN','HR_OFFICER'],
    'logs':         ['SUPER_ADMIN','HR_OFFICER'],
    'users':        ['SUPER_ADMIN','HR_OFFICER'],
    'setup':        ['SUPER_ADMIN'],
    'self-service': ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF','EMPLOYEE']
  };

  // Sidebar visibility: who sees the item at all (show to more roles, just lock it)
  // EMPLOYEE sees only self-service; everyone else sees full sidebar (some items locked)
  var alwaysHide = {
    'self-service': ['SUPER_ADMIN','HR_OFFICER','ENTITY_MANAGER','STAFF'], // already in nav
  };

  document.querySelectorAll('.sb-item[data-view]').forEach(function(item) {
    var view = item.dataset.view;
    var allowed = rules[view] || [];
    var canAccess = allowed.indexOf(role) >= 0;

    if (role === 'EMPLOYEE') {
      // Employee sees only self-service
      item.style.display = (view === 'self-service') ? '' : 'none';
      item.classList.remove('sb-locked');
    } else if (role === 'STAFF') {
      // STAFF: show all items, lock the ones they can't access
      item.style.display = '';
      if (canAccess) {
        item.classList.remove('sb-locked');
      } else {
        item.classList.add('sb-locked');
      }
    } else {
      // All other roles: hide items they have no access to
      item.style.display = canAccess ? '' : 'none';
      item.classList.remove('sb-locked');
    }
  });
  // Populate sidebar user avatar
  if (APP.user) {
    var uName = APP.user.name || APP.user.email || '?';
    var initials = uName.trim().split(/\s+/).map(function(w){ return w[0]||''; }).slice(0,2).join('').toUpperCase() || '?';
    var elName = document.getElementById('sb-user-name');
    var elRole = document.getElementById('sb-user-role');
    var elAv   = document.getElementById('sb-avatar-initials');
    if (elName) elName.textContent = uName;
    if (elRole) elRole.textContent = APP.user.role || '—';
    if (elAv)   elAv.textContent   = initials;
  }
  // Hide write-action buttons for view-only roles
  var hideActions = isReadOnly();
  document.querySelectorAll('.hr-action-btn').forEach(function(el){
    el.style.display = hideActions ? 'none' : '';
  });
}

  else if(act==='edit-ob')       OBAgent.openEdit(t.dataset.obid);
  else if(act==='cancel-ob')     OBAgent.cancel(t.dataset.obid);
  else if(act==='gen-ol')        OBAgent.openOLForId(t.dataset.obid,t.dataset.name,t.dataset.type,t.dataset.pp);
  else if(act==='del-ltr')       LtrAgent.delEntry(t.dataset.ref);
  else if(act==='edit-user')     UserMgmtAgent.openEdit(t.dataset.email);
  else if(act==='del-user')      UserMgmtAgent.deactivate(t.dataset.email);
  else if(act==='approve-leave') LeaveAgent.openStatus(t.dataset.leaveid,'Approved');
  else if(act==='reject-leave')  LeaveAgent.openStatus(t.dataset.leaveid,'Rejected');
  else if(act==='close-job')     RecruitmentAgent.closeJob(t.dataset.jobid);
  else if(act==='edit-job')      RecruitmentAgent.openEditJob(t.dataset.jobid);
  else if(act==='view-apps')     RecruitmentAgent.showApps(t.dataset.jobid);
  else if(act==='move-stage')    RecruitmentAgent.openMoveStage(t.dataset.appid,t.dataset.name);
  else if(act==='transfer-app')  RecruitmentAgent.transferToOnboarding(t.dataset.appid);
});

function showLoginScreen(msg) {
  var overlay = document.getElementById('login-overlay');
  if (!overlay) return;
  overlay.style.display = 'flex';
  document.getElementById('main-wrapper') && (document.getElementById('main-wrapper').style.display = 'none');
  document.getElementById('sidebar')      && (document.getElementById('sidebar').style.display      = 'none');
  var errEl = document.getElementById('login-err');
  if (errEl) { errEl.textContent = msg||''; errEl.style.display = msg ? 'block' : 'none'; }
  var inp = document.getElementById('login-password'); if(inp) { inp.value=''; inp.focus(); }
}

function hideLoginScreen() {
  var overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'none';
  document.getElementById('main-wrapper') && (document.getElementById('main-wrapper').style.display = '');
  document.getElementById('sidebar')      && (document.getElementById('sidebar').style.display      = '');
}

function doLogin() {
  var email = (document.getElementById('login-email')||{}).value||'';
  var pass  = (document.getElementById('login-password')||{}).value||'';
  var errEl = document.getElementById('login-err');
  var btn   = document.getElementById('login-btn');
  if (!email || !pass) {
    if(errEl){ errEl.textContent='Email and password are required.'; errEl.style.display='block'; } return;
  }
  if(errEl) errEl.style.display='none';
  if(btn){ btn.disabled=true; btn.textContent='Signing in…'; }
  google.script.run
    .withSuccessHandler(function(r){
      if(btn){ btn.disabled=false; btn.textContent='Sign In'; }
      if(!r || !r.success){
        if(errEl){ errEl.textContent=r?r.error:'Login failed.'; errEl.style.display='block'; } return;
      }
      APP.token = r.token;
      APP.user  = r.profile;
      sessionStorage.setItem('ughr_token', r.token);
      hideLoginScreen();
      AgentManager.init();
      if (r.profile && r.profile.mustChange) ProfileAgent._showForcedChange();
    })
    .withFailureHandler(function(e){
      if(btn){ btn.disabled=false; btn.textContent='Sign In'; }
      if(errEl){ errEl.textContent='Error: '+(e.message||e); errEl.style.display='block'; }
    })
    .loginUser(email, pass);
}

function doLogout() {
  var token = APP.token || sessionStorage.getItem('ughr_token');
  sessionStorage.removeItem('ughr_token');
  APP.token = '';
  google.script.run.logoutUser(token);
  showLoginScreen('You have been signed out.');
}

window.addEventListener('DOMContentLoaded', function() {
  DarkMode.init();
  var token = sessionStorage.getItem('ughr_token');
  if (token) {
    APP.token = token;
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          APP.user = r.profile;
          hideLoginScreen();
          AgentManager.init();
        } else {
          sessionStorage.removeItem('ughr_token');
          APP.token = '';
          showLoginScreen(r && r.error === 'SESSION_EXPIRED' ? 'Session expired. Please log in again.' : '');
        }
      })
      .withFailureHandler(function() { showLoginScreen(); })
      .validateSession(token);
  } else {
    showLoginScreen();
  }
});

  resetF: function() {

    var t=document.getElementById('lv-type'); if(t) t.value='';
    this.render();
  },
  _calYear: new Date().getFullYear(),
  _calMonth: new Date().getMonth(),
  setView: function(v) {
    var lv = document.getElementById('lv-list-view');
    var cv = document.getElementById('lv-calendar-view');
    var bl = document.getElementById('lv-view-list');
    var bc = document.getElementById('lv-view-cal');
    if (v === 'calendar') {
      if(lv) lv.style.display = 'none'; if(cv) cv.style.display = '';
      if(bc) { bc.style.background='var(--navy)'; bc.style.color='#fff'; }
      if(bl) { bl.style.background=''; bl.style.color=''; }
      this.renderCalendar();
    } else {
      if(cv) cv.style.display = 'none'; if(lv) lv.style.display = '';
      if(bl) { bl.style.background='var(--navy)'; bl.style.color='#fff'; }
      if(bc) { bc.style.background=''; bc.style.color=''; }
    }
  },
  calPrev: function() { this._calMonth--; if(this._calMonth < 0){ this._calMonth=11; this._calYear--; } this.renderCalendar(); },
  calNext: function() { this._calMonth++; if(this._calMonth > 11){ this._calMonth=0; this._calYear++; } this.renderCalendar(); },
  renderCalendar: function() {
    var self = this;
    var yr = this._calYear, mo = this._calMonth;
    var titleEl = document.getElementById('lv-cal-title');
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    if (titleEl) titleEl.textContent = MONTHS[mo] + ' ' + yr;
    var grid = document.getElementById('lv-cal-grid'); if(!grid) return;
    var typeClass = { 'Annual Leave':'annual','Sick Leave':'sick','Emergency':'emergency','Unpaid Leave':'unpaid','Other':'other' };
    // Build day-indexed map of leaves
    var leaveMap = {};
    (this._data || []).forEach(function(r) {
      if (r.STATUS === 'Rejected') return;
      var start = new Date(r.START_DATE||''), end = new Date(r.END_DATE||'');
      if (isNaN(start) || isNaN(end)) return;
      for (var d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        if (d.getFullYear()===yr && d.getMonth()===mo) {
          var key = d.getDate();
          if (!leaveMap[key]) leaveMap[key] = [];
          leaveMap[key].push(r);
        }
      }
    });
    var today = new Date(); var todayKey = (today.getFullYear()===yr && today.getMonth()===mo) ? today.getDate() : -1;
    var firstDay = new Date(yr, mo, 1).getDay(); // 0=Sun
    firstDay = (firstDay + 6) % 7; // Make Mon=0
    var daysInMonth = new Date(yr, mo+1, 0).getDate();
    var DAY_HDRS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var html = DAY_HDRS.map(function(d){ return '<div class="leave-cal-day-hdr">'+d+'</div>'; }).join('');
    // Leading blank cells
    for (var b = 0; b < firstDay; b++) html += '<div class="cal-day other-month"></div>';
    for (var dn = 1; dn <= daysInMonth; dn++) {
      var cls = 'cal-day' + (dn===todayKey?' today':'');
      var leaves = leaveMap[dn] || [];
      var chips = leaves.slice(0,3).map(function(r) {
        var tc = typeClass[r.LEAVE_TYPE||''] || 'other';
        var isPending = r.STATUS === 'Pending';
        return '<span class="cal-chip '+tc+(isPending?' pending-dot':'')+'" title="'+esc((r.EMP_NAME||'?')+(isPending?' (Pending)':''))+' — '+esc(r.LEAVE_TYPE||'Leave')+'">'+esc((r.EMP_NAME||'?').split(' ')[0])+'</span>';
      }).join('');
      if (leaves.length > 3) chips += '<span style="font-size:9px;color:var(--muted);padding:1px 4px">+' + (leaves.length-3) + ' more</span>';
      html += '<div class="'+cls+'"><div class="cal-day-num">'+dn+'</div>'+chips+'</div>';
    }
    grid.innerHTML = html;
  },
  openAdd: function() {
    var role = APP.user ? APP.user.role : '';
    var isEmp = role === 'EMPLOYEE';
    var empIdField = document.getElementById('lvf-empid');
    if(empIdField) {
      if(isEmp) { empIdField.readOnly = true; empIdField.value = 'Auto-assigned'; }
      else { empIdField.readOnly = false; empIdField.value = ''; }
    }
    var ef = document.getElementById('lvf-empname'); if(ef) ef.value = '';
    var st = document.getElementById('lvf-start'); if(st) st.value = '';
    var en = document.getElementById('lvf-end'); if(en) en.value = '';
    var dy = document.getElementById('lvf-days'); if(dy) dy.value = '';
    var tp = document.getElementById('lvf-type'); if(tp) tp.value = '';
    var nt = document.getElementById('lvf-notes'); if(nt) nt.value = '';
    openM('m-leave');
  },
  calcDays: function() {
    var s = document.getElementById('lvf-start'); var e = document.getElementById('lvf-end');
    var d = document.getElementById('lvf-days');
    if(!s||!e||!d) return;
    if(s.value && e.value) {
      var diff = Math.round((new Date(e.value) - new Date(s.value))/(1000*60*60*24)) + 1;
      d.value = diff > 0 ? diff : '';
    }
  },
  save: function() {
    var type  = (document.getElementById('lvf-type')||{}).value;
    var start = (document.getElementById('lvf-start')||{}).value;
    var end   = (document.getElementById('lvf-end')||{}).value;
    var days  = (document.getElementById('lvf-days')||{}).value;

    var empName=(document.getElementById('lvf-empname')||{}).value;
    if(!type||!start||!end) { toast('Leave type, start and end dates required','error'); return; }
    var data = {LEAVE_TYPE:type, START_DATE:start, END_DATE:end, DAYS:days, NOTES:notes};
    var role = APP.user ? APP.user.role : '';
    if(role !== 'EMPLOYEE') { data.EMP_ID = empId; data.EMP_NAME = empName; }
    GAS.addLeave(data, function(r) {
      if(!r || !r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      toast('Leave submitted','success');
      closeM('m-leave');
      LeaveAgent.load('');
    });
  },
  openStatus: function(leaveId, defaultStatus) {
    this._pendingStatusLeaveId = leaveId;

    var nt = document.getElementById('lvs-notes'); if(nt) nt.value = '';

      LeaveAgent.load('');

  }

var RecruitmentAgent = {
  _jobs: [], _apps: [], _currentJobId: '', _view: 'kanban',
  loadJobs: function() {
    GAS.getJobs(function(r) {
      if(!r || !r.success) { toast('Error loading jobs','error'); return; }
      RecruitmentAgent._jobs = r.data || [];
      RecruitmentAgent.renderJobs();
    });
  },
  showApps: function(jobId) {
    RecruitmentAgent._currentJobId = jobId||'';
    var jp = document.getElementById('rec-jobs-panel'); if(jp) jp.style.display='none';
    var ap = document.getElementById('rec-apps-panel'); if(ap) ap.style.display='';
    GAS.getApplications(jobId||'', function(r) {
      if(!r || !r.success) { toast('Error loading applications','error'); return; }
      RecruitmentAgent._apps = r.data || [];
      RecruitmentAgent.renderApps();
    });
  },
  showJobsPanel: function() {
    var jp = document.getElementById('rec-jobs-panel'); if(jp) jp.style.display='';
    var ap = document.getElementById('rec-apps-panel'); if(ap) ap.style.display='none';
  },
  renderJobs: function() {
    var tb = document.getElementById('jobs-tbody'); if(!tb) return;
    var cnt = document.getElementById('jobs-cnt'); if(cnt) cnt.textContent = this._jobs.length;
    if(!this._jobs.length) { tb.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted)">No jobs posted yet.</td></tr>'; return; }
    var stsMap = {Active:'bg2', Closed:'bn', Draft:'bo'};
    tb.innerHTML = this._jobs.map(function(j) {
      return '<tr>'+
        '<td style="font-family:monospace;font-size:10.5px">'+esc(j.JOB_ID)+'</td>'+
        '<td style="font-weight:600">'+esc(j.TITLE)+'</td>'+
        '<td>'+esc(j.ENTITY)+'</td>'+
        '<td>'+esc(j.LOCATION)+'</td>'+
        '<td>'+esc(j.JOB_TYPE)+'</td>'+
        '<td style="font-size:11px;color:var(--teal)">'+esc(j.SALARY_RANGE||'—')+'</td>'+
        '<td><span class="badge '+(stsMap[j.STATUS]||'bn')+'">'+esc(j.STATUS)+'</span></td>'+
        '<td style="font-size:10.5px;color:var(--muted)">'+fmtD(j.POSTED_DATE)+'</td>'+
        '<td><div class="act-btns">'+
          '<button class="btn btn-secondary btn-icon btn-sm" data-action="view-apps" data-jobid="'+esc(j.JOB_ID)+'" title="View Applications">&#128203;</button>'+
          '<button class="btn btn-secondary btn-icon btn-sm" data-action="edit-job" data-jobid="'+esc(j.JOB_ID)+'" title="Edit">&#9998;</button>'+
          (j.STATUS==='Active'?'<button class="btn btn-danger btn-icon btn-sm" data-action="close-job" data-jobid="'+esc(j.JOB_ID)+'" title="Close Job">&#10006;</button>':'')+
        '</div></td>'+
      '</tr>';
    }).join('');
  },
  setView: function(v) {
    this._view = v;
    var lv = document.getElementById('rec-list-view');
    var kv = document.getElementById('rec-kanban-view');
    var bl = document.getElementById('rec-view-list');
    var bk = document.getElementById('rec-view-kanban');
    if (v === 'kanban') {
      if(lv) lv.style.display = 'none';
      if(kv) kv.style.display = '';
      if(bk) bk.style.background = 'var(--navy)'; if(bk) bk.style.color = '#fff';
      if(bl) bl.style.background = ''; if(bl) bl.style.color = '';
      this.renderKanban();
    } else {
      if(kv) kv.style.display = 'none';
      if(lv) lv.style.display = '';
      if(bl) bl.style.background = 'var(--navy)'; if(bl) bl.style.color = '#fff';
      if(bk) bk.style.background = ''; if(bk) bk.style.color = '';
    }
  },
  renderKanban: function() {
    var self = this;
    var board = document.getElementById('kanban-board'); if(!board) return;
    var stages = ['New','Screening','Interview','Offer','Hired'];
    var stageColors = { New:'#8fa3be', Screening:'#b87000', Interview:'#1e4799', Offer:'#136e42', Hired:'#007a8a' };
    var groups = {};
    stages.forEach(function(s){ groups[s] = []; });
    this._apps.forEach(function(a){ var s = a.STAGE||'New'; if(!groups[s]) groups[s]=[]; groups[s].push(a); });
    var now = Date.now();
    board.innerHTML = stages.map(function(stage) {
      var cards = groups[stage] || [];
      var cardHtml = cards.length ? cards.map(function(a) {
        var appliedMs = new Date(a.APPLIED_DATE||'').getTime();
        var daysIn = isNaN(appliedMs) ? 0 : Math.floor((now - appliedMs) / 86400000);
        var daysCls = daysIn > 7 ? 'late' : daysIn > 3 ? 'warn' : 'ok';
        return '<div class="kanban-card" onclick="RecruitmentAgent.openMoveStage(\''+esc(a.APP_ID)+'\',\''+esc(a.FULL_NAME)+'\')">'+
          '<div class="kanban-card-name">'+esc(a.FULL_NAME||'—')+'</div>'+
          '<div class="kanban-card-meta">'+esc(a.JOB_TITLE||'—')+'</div>'+
          (a.CV_DRIVE_LINK ? '<div class="kanban-card-meta"><a href="'+esc(a.CV_DRIVE_LINK)+'" target="_blank" onclick="event.stopPropagation()" style="color:var(--teal);font-size:10px">&#128196; CV</a></div>' : '')+
          '<div class="kanban-card-days '+daysCls+'">'+daysIn+'d in stage</div>'+
        '</div>';
      }).join('') : '<div class="kanban-empty">No applicants</div>';
      return '<div class="kanban-col">'+
        '<div class="kanban-col-hdr" style="border-top:3px solid '+stageColors[stage]+'">'+
          '<span class="kanban-col-title">'+esc(stage)+'</span>'+
          '<span class="kanban-col-cnt">'+cards.length+'</span>'+
        '</div>'+
        '<div class="kanban-col-body">'+cardHtml+'</div>'+
      '</div>';
    }).join('');
  },
  renderApps: function() {
    var tb = document.getElementById('apps-tbody'); if(!tb) return;
    var cnt = document.getElementById('apps-cnt'); if(cnt) cnt.textContent = this._apps.length;
    // Update sidebar badge with shortlisted application count
    var shortlisted = this._apps.filter(function(a){ return a.STAGE === 'Screening' || a.STAGE === 'Interview'; }).length;
    var nbRec = document.getElementById('nb-rec');
    if (nbRec) { nbRec.textContent = shortlisted; nbRec.className = shortlisted > 0 ? 'sb-badge blue' : 'sb-badge blue hide'; }
    // Render whichever view is active
    this.setView(this._view);
    var jobTitle = document.getElementById('apps-job-title');
    if(jobTitle && this._currentJobId) {
      var job = this._jobs.find(function(j){ return j.JOB_ID === RecruitmentAgent._currentJobId; });
      if(jobTitle) jobTitle.textContent = job ? job.TITLE : this._currentJobId;
    }
    if(!this._apps.length) { tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">No applications found.</td></tr>'; return; }
    var stageMap = {New:'bn',Screening:'bo',Interview:'bs',Offer:'bp',Hired:'bg2',Rejected:'br',Transferred:'bg2'};
    tb.innerHTML = this._apps.map(function(a) {
      var stCls = stageMap[a.STAGE]||'bn';
      var canTransfer = (a.STAGE === 'Offer' || a.STAGE === 'Hired') && a.STAGE !== 'Transferred';
      return '<tr>'+
        '<td style="font-weight:600">'+esc(a.FULL_NAME||'—')+'</td>'+
        '<td style="font-size:11px">'+esc(a.EMAIL||'—')+'</td>'+
        '<td>'+esc(a.JOB_TITLE||'—')+'</td>'+
        '<td style="font-size:11px;color:var(--muted)">'+fmtD(a.APPLIED_DATE||'—')+'</td>'+
        '<td><span class="badge '+stCls+'">'+esc(a.STAGE||'—')+'</span></td>'+
        '<td style="text-align:center">'+(a.CV_DRIVE_LINK?'<a class="btn btn-secondary btn-sm" href="'+esc(a.CV_DRIVE_LINK)+'" target="_blank" title="View uploaded CV/Resume" style="font-size:10px;gap:3px">&#128196; View CV</a>':'<span style="color:var(--muted);font-size:11px">—</span>')+'</td>'+
        '<td><div class="act-btns">'+
          '<button class="btn btn-secondary btn-sm" data-action="move-stage" data-appid="'+esc(a.APP_ID)+'" data-name="'+esc(a.FULL_NAME)+'" style="font-size:10px">Move Stage</button>'+
          (canTransfer?'<button class="btn btn-gold btn-sm" data-action="transfer-app" data-appid="'+esc(a.APP_ID)+'" style="font-size:10px" title="Transfer to Onboarding">→ Onboard</button>':'')+
        '</div></td>'+
      '</tr>';
    }).join('');
  },
  openAddJob: function() {
    ['jf-title','jf-entity','jf-location','jf-type','jf-salary','jf-desc','jf-req'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.value='';
    });
    var sts = document.getElementById('jf-status'); if(sts) sts.value='Active';
    document.getElementById('jf-jobid').value = '';
    document.getElementById('m-job-ttl').textContent = 'Post New Job';
    openM('m-job');
  },
  openEditJob: function(jobId) {
    var j = this._jobs.find(function(x){ return x.JOB_ID === jobId; });
    if(!j) return;
    document.getElementById('jf-jobid').value  = j.JOB_ID;
    document.getElementById('jf-title').value  = j.TITLE||'';
    document.getElementById('jf-entity').value = j.ENTITY||'';
    document.getElementById('jf-location').value=j.LOCATION||'';
    document.getElementById('jf-type').value   = j.JOB_TYPE||'';
    document.getElementById('jf-status').value = j.STATUS||'Active';
    document.getElementById('jf-salary').value = j.SALARY_RANGE||'';
    document.getElementById('jf-desc').value   = j.DESCRIPTION||'';
    document.getElementById('jf-req').value    = j.REQUIREMENTS||'';
    document.getElementById('m-job-ttl').textContent = 'Edit Job';
    openM('m-job');
  },
  saveJob: function() {
    var title = (document.getElementById('jf-title')||{}).value||'';
    if(!title) { toast('Job title required','error'); return; }
    var data = {
      JOB_ID:       (document.getElementById('jf-jobid')||{}).value||'',
      TITLE:        title,
      ENTITY:       (document.getElementById('jf-entity')||{}).value||'',
      LOCATION:     (document.getElementById('jf-location')||{}).value||'',
      JOB_TYPE:     (document.getElementById('jf-type')||{}).value||'',
      STATUS:       (document.getElementById('jf-status')||{}).value||'Active',
      SALARY_RANGE: (document.getElementById('jf-salary')||{}).value||'',
      DESCRIPTION:  (document.getElementById('jf-desc')||{}).value||'',
      REQUIREMENTS: (document.getElementById('jf-req')||{}).value||''
    };
    GAS.saveJob(data, function(r) {
      if(!r || !r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      toast('Job saved','success');
      closeM('m-job');
      RecruitmentAgent.loadJobs();
    });
  },
  closeJob: function(jobId) {
    if(!confirm('Close this job posting?')) return;
    GAS.closeJob(jobId, function(r) {
      if(!r || !r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      toast('Job closed','success');
      RecruitmentAgent.loadJobs();
    });
  },
  _pendingStageAppId: null,
  openMoveStage: function(appId, name) {
    this._pendingStageAppId = appId;
    var lbl = document.getElementById('ms-name'); if(lbl) lbl.textContent = name;
    var ns = document.getElementById('ms-stage'); if(ns) ns.value = '';
    var nt = document.getElementById('ms-notes'); if(nt) nt.value = '';
    openM('m-move-stage');
  },
  confirmMoveStage: function() {
    var id    = this._pendingStageAppId;
    var stage = (document.getElementById('ms-stage')||{}).value;
    var notes = (document.getElementById('ms-notes')||{}).value;
    if(!id||!stage) { toast('Select a stage','error'); return; }
    GAS.updateApplicationStage(id, stage, notes, function(r) {
      if(!r || !r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      toast('Stage updated to '+stage,'success');
      closeM('m-move-stage');
      RecruitmentAgent.showApps(RecruitmentAgent._currentJobId);
    });
  },
  // ---- keep existing method ----
  transferToOnboarding: function(appId) {
    if(!confirm('Transfer this applicant to the Onboarding pipeline?')) return;
    GAS.transferAppToOnboarding(appId, function(r) {
      if(!r || !r.success) { toast('Error: '+(r?r.error:'Unknown'),'error'); return; }
      toast('Transferred to Onboarding: '+r.obId,'success');
      RecruitmentAgent.showApps(RecruitmentAgent._currentJobId);
      // Refresh onboarding
      GAS.call('getOnboarding',[],function(ob){ if(ob&&ob.success){ APP.onboarding=ob.data||[]; OBAgent.render(); } });
    });
  }
};
